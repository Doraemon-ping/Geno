<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 赵氏家谱平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/ui-polish.css">
</head>
<body>
    <nav class="navbar">
        <a class="logo" href="index.html">赵氏家谱</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="public.html">万姓同根</a>
            <a href="register.html">申请入谱</a>
            <a href="forget-password.html">找回密码</a>
        </div>
    </nav>

    <header class="hero">
        <h1>入谱登录</h1>
        <p>登录后系统会继续带你回到刚才要访问的页面，无论是谱页详情、个人中心还是我的族谱，都可以从这里无缝接续。</p>
    </header>

    <main class="container">
        <section class="panel">
            <div class="section-title">登录说明</div>
            <div class="intro-list">
                <div class="intro-card">
                    <strong>资料维护</strong>
                    登录后可在个人中心更新邮箱、手机号，并查看自己的任务记录。
                </div>
                <div class="intro-card">
                    <strong>谱页管理</strong>
                    进入“我的族谱”后，可新建卷宗、维护公开状态，并继续编修字辈。
                </div>
                <div class="intro-card">
                    <strong>自动跳转</strong>
                    如果你是从某个业务页跳来登录，登录成功后会自动返回原页面继续操作。
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="section-title">账号登录</div>
            <form id="loginForm">
                <div class="field">
                    <label for="username">账号</label>
                    <input id="username" name="username" type="text" placeholder="请输入用户名" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="password">密码</label>
                    <input id="password" name="password" type="password" placeholder="请输入密码" autocomplete="current-password" required>
                </div>
                <div class="toolbar">
                    <label><input id="remember" type="checkbox"> 记住当前登录状态</label>
                    <a href="forget-password.html">找回密码</a>
                </div>
                <div class="message" id="message"></div>
                <button class="action-button" id="submitButton" type="submit">登录并进入</button>
            </form>
            <div class="footer-links">
                <a class="ghost-button" href="register.html">没有账号，去申请入谱</a>
                <a class="ghost-button" href="public.html">先浏览公开谱库</a>
            </div>
        </section>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
