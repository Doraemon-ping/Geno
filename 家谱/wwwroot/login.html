<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 赵氏家谱平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b4513;
            --accent: #a0522d;
            --gold: #d4af37;
            --paper: #fdfaf2;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Noto Serif SC", "KaiTi", serif;
            background: var(--paper);
            color: #333;
            padding-top: 80px;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139, 69, 19, 0.1);
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 4px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 26px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-size: 16px;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .hero {
            height: 260px;
            background:
                linear-gradient(rgba(44, 30, 22, 0.48), rgba(44, 30, 22, 0.48)),
                url("https://images.unsplash.com/photo-1516546453174-5e1098a4b4af?q=80&w=1800") center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            margin: 0 0 12px;
            font-size: 40px;
            letter-spacing: 8px;
        }

        .hero p {
            margin: 0;
            max-width: 720px;
            line-height: 1.9;
            opacity: 0.92;
        }

        .container {
            max-width: 1120px;
            margin: -46px auto 60px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1.05fr;
            gap: 24px;
        }

        .panel {
            background: white;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 24px;
            color: var(--primary);
            border-left: 5px solid var(--primary);
            padding-left: 15px;
            margin-bottom: 20px;
        }

        .intro-list {
            display: grid;
            gap: 16px;
        }

        .intro-card {
            background: #faf7f2;
            border-left: 3px solid var(--gold);
            padding: 16px;
            line-height: 1.9;
            color: #666;
        }

        .intro-card strong {
            display: block;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
        }

        .field input {
            width: 100%;
            padding: 13px 14px;
            border: 1px solid rgba(139, 69, 19, 0.18);
            border-radius: 2px;
            font-family: inherit;
            font-size: 15px;
            background: #fffdf8;
        }

        .field input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(160, 82, 45, 0.08);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 8px 0 20px;
            color: #666;
            font-size: 14px;
        }

        .toolbar a {
            color: var(--primary);
            text-decoration: none;
        }

        .toolbar label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .message {
            min-height: 24px;
            margin-bottom: 14px;
            color: #c0392b;
        }

        .action-button,
        .ghost-button {
            border: none;
            padding: 12px 18px;
            border-radius: 2px;
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
        }

        .action-button {
            width: 100%;
            background: var(--primary);
            color: white;
        }

        .ghost-button {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .footer-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        @media (max-width: 860px) {
            .container {
                grid-template-columns: 1fr;
            }

            .hero h1 {
                font-size: 32px;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a class="logo" href="index.html">赵氏家谱</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="public.html">万姓同根</a>
            <a href="register.html">申请入谱</a>
            <a href="forget-password.html">找回密码</a>
        </div>
    </nav>

    <header class="hero">
        <h1>入谱登录</h1>
        <p>登录后系统会继续带你回到刚才要访问的页面，无论是谱页详情、个人中心还是我的族谱，都可以从这里无缝接续。</p>
    </header>

    <main class="container">
        <section class="panel">
            <div class="section-title">登录说明</div>
            <div class="intro-list">
                <div class="intro-card">
                    <strong>资料维护</strong>
                    登录后可在个人中心更新邮箱、手机号，并查看自己的任务记录。
                </div>
                <div class="intro-card">
                    <strong>谱页管理</strong>
                    进入“我的族谱”后，可新建卷宗、维护公开状态，并继续编修字辈。
                </div>
                <div class="intro-card">
                    <strong>自动跳转</strong>
                    如果你是从某个业务页跳来登录，登录成功后会自动返回原页面继续操作。
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="section-title">账号登录</div>
            <form id="loginForm">
                <div class="field">
                    <label for="username">账号</label>
                    <input id="username" name="username" type="text" placeholder="请输入用户名" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="password">密码</label>
                    <input id="password" name="password" type="password" placeholder="请输入密码" autocomplete="current-password" required>
                </div>
                <div class="toolbar">
                    <label><input id="remember" type="checkbox"> 记住当前登录状态</label>
                    <a href="forget-password.html">找回密码</a>
                </div>
                <div class="message" id="message"></div>
                <button class="action-button" id="submitButton" type="submit">登录并进入</button>
            </form>
            <div class="footer-links">
                <a class="ghost-button" href="register.html">没有账号，去申请入谱</a>
                <a class="ghost-button" href="public.html">先浏览公开谱库</a>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById("loginForm");
        const message = document.getElementById("message");
        const submitButton = document.getElementById("submitButton");
        const redirect = new URLSearchParams(location.search).get("redirect");
        const existingToken = localStorage.getItem("token");

        function resolveRedirect() {
            if (!redirect) {
                return "index.html";
            }

            return redirect.startsWith("/") ? redirect.slice(1) : redirect;
        }

        async function requestJson(url, options = {}) {
            const response = await fetch(url, options);
            const payload = await response.json();

            if (!response.ok) {
                throw new Error(payload?.message || "登录失败");
            }

            return payload;
        }

        if (existingToken) {
            location.href = resolveRedirect();
        }

        form.addEventListener("submit", async event => {
            event.preventDefault();
            message.textContent = "";
            submitButton.disabled = true;
            submitButton.textContent = "正在校验身份...";

            const payload = {
                username: document.getElementById("username").value.trim(),
                password: document.getElementById("password").value
            };

            try {
                const result = await requestJson("/api/Account/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (result.code !== 200 || !result.data?.token) {
                    throw new Error(result.message || "登录失败");
                }

                localStorage.setItem("token", result.data.token);
                if (!document.getElementById("remember").checked) {
                    sessionStorage.setItem("login-ephemeral", "1");
                } else {
                    sessionStorage.removeItem("login-ephemeral");
                }

                submitButton.textContent = "登录成功，正在进入...";
                location.href = resolveRedirect();
            } catch (error) {
                message.textContent = error.message;
                submitButton.disabled = false;
                submitButton.textContent = "登录并进入";
            }
        });
    </script>
</body>
</html>
