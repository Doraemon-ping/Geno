<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赵氏家谱 - 开启族门</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --primary-brown: #794c30; /* 主色：沉稳棕 */
            --dark-brown: #4a2e1b; /* 深棕：用于强调和对比 */
            --light-brown: #c8b4a2; /* 浅棕：用于辅助装饰 */
            --bg-color: #f0ebe1; /* 页面背景：极浅的米色，凸显白色卡片 */
            --text-main: #333333;
            --text-muted: #888888;
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Noto Serif SC', serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 核心卡片容器 */
        .login-wrapper {
            display: flex;
            width: 1000px;
            max-width: 90%;
            height: 600px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(74, 46, 27, 0.08);
            overflow: hidden; /* 保证内部元素不出界 */
        }

        /* ================= 左侧品牌区 ================= */
        .brand-side {
            flex: 1;
            background-color: #f7f5f0;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            overflow: hidden;
            border-right: 1px solid rgba(0,0,0,0.03);
        }

        /* 仿照参考图的纯 CSS 几何装饰图形 */
        .shape {
            position: absolute;
            border-radius: 50%;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: var(--dark-brown);
            top: -100px;
            right: -100px;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            background: var(--light-brown);
            top: -50px;
            left: 10%;
        }

        .shape-3 {
            width: 250px;
            height: 250px;
            background: var(--primary-brown);
            bottom: -100px;
            left: -100px;
        }

        .shape-4 {
            width: 80px;
            height: 80px;
            background: var(--light-brown);
            bottom: 50px;
            right: 50px;
        }

        .shape-5 {
            width: 20px;
            height: 20px;
            background: var(--primary-brown);
            top: 45%;
            right: 25%;
        }

        /* 品牌 Logo 与标题 */
        .brand-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: var(--dark-brown);
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: var(--dark-brown);
            color: #fff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            margin: 0 auto 20px;
            transform: rotate(-10deg); /* 增加一点活泼感 */
        }

        .brand-content h1 {
            font-size: 32px;
            margin: 0;
            letter-spacing: 4px;
        }

        /* 左侧底部链接 */
        .footer-links {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 20px;
            font-size: 12px;
            font-family: sans-serif;
            color: var(--text-muted);
            z-index: 10;
        }

            .footer-links a {
                color: inherit;
                text-decoration: none;
                font-weight: bold;
            }

                .footer-links a:hover {
                    color: var(--primary-brown);
                }

        /* ================= 右侧表单区 ================= */
        .form-side {
            flex: 1;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #ffffff;
        }

            .form-side h2 {
                font-size: 30px;
                color: var(--dark-brown);
                margin-bottom: 40px;
                font-weight: bold;
                letter-spacing: 2px;
            }

        /* 极简下划线输入框（参考图风格） */
        .input-group {
            margin-bottom: 30px;
            position: relative;
        }

            .input-group label {
                display: block;
                font-size: 12px;
                color: var(--text-muted);
                margin-bottom: 8px;
                font-family: sans-serif;
                font-weight: bold;
            }

            .input-group input {
                width: 100%;
                padding: 8px 0;
                border: none;
                border-bottom: 2px solid #eeeeee;
                font-size: 16px;
                color: var(--text-main);
                outline: none;
                background: transparent;
            }

                .input-group input:focus {
                    border-bottom-color: var(--primary-brown);
                }

        /* 记住密码与辅助链接 */
        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-bottom: 30px;
            font-family: sans-serif;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            cursor: pointer;
        }

            .checkbox-label input {
                accent-color: var(--primary-brown);
            }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-brown);
            color: white;
            border: none;
            border-radius: 30px; /* 圆角药丸形按钮 */
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 4px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(121, 76, 48, 0.2);
        }

            .btn-submit:hover {
                background-color: var(--dark-brown);
                transform: translateY(-2px);
            }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-family: sans-serif;
        }

            .forgot-link:hover {
                color: var(--primary-brown);
                text-decoration: underline;
            }

        #msg {
            color: #d32f2f;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            font-weight: bold;
        }

        /* 响应式：移动端堆叠显示 */
        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                border-radius: 0;
            }

            .brand-side {
                padding: 60px 20px;
                flex: none;
            }

            .form-side {
                padding: 40px 30px;
            }

            .shape-1, .shape-3 {
                opacity: 0.5;
            }
            /* 移动端减弱装饰干扰 */
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="brand-side">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
            <div class="shape shape-5"></div>

            <div class="brand-content">
                <div class="brand-logo">赵</div>
                <h1>赵氏家谱</h1>
            </div>

            <div class="footer-links">
                <a href="#">关于我们</a>
                <a href="#">隐私政策</a>
                <a href="#">使用条款</a>
                <a href="#">常见问题</a>
            </div>
        </div>

        <div class="form-side">
            <h2>入谱登录</h2>

            <div id="msg">查验失败，请重试</div>

            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>族人账号 / Account</label>
                    <input type="text" id="username" placeholder="请输入名号" required>
                </div>

                <div class="input-group">
                    <label>入内凭证 / Password</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>

                <div class="form-actions">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember"> 铭记身份
                    </label>
                </div>

                <button type="submit" class="btn-submit" id="loginBtn">开启族谱</button>

                <a href="/forget-password.html" class="forgot-link">遗忘凭证？</a>
            </form>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const msgEl = document.getElementById('msg');
            const btn = document.getElementById('loginBtn');
            msgEl.style.display = 'none';

            const payload = {
                username: document.querySelector('#username').value,
                password: document.querySelector('#password').value
            };

            btn.innerText = "核查中...";
            btn.disabled = true;

            try {
                // 处理你的 { code, message, data } 返回格式
                const res = await axios.post('/api/account/login', payload);
                const { code, message, data } = res.data;

                if (code === 200) {
                    localStorage.setItem('token', data.token);
                    btn.innerText = "核验通过";
                    btn.style.background = "#4a2e1b"; // 变成深棕色表示成功
                    setTimeout(() => window.location.href = "/index.html", 800);
                } else {
                    msgEl.style.display = 'block';
                    msgEl.innerText = message || "凭证有误，请重新输入";
                    resetBtn();
                }
            } catch (e) {
                msgEl.style.display = 'block';
                msgEl.innerText = e.response?.data?.message || "网络异常，请稍后再试";
                resetBtn();
            }
        }

        function resetBtn() {
            const btn = document.getElementById('loginBtn');
            btn.disabled = false;
            btn.innerText = "开启族谱";
        }
    </script>
</body>
</html>
