<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>找回凭证 - 赵氏家谱平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --primary: #8b4513;
            --bg: #fdfaf2;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Serif SC', serif;
            background: url('https://images.unsplash.com/photo-1578330132821-4912f71120c4?q=80&w=2000') center/cover;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 10;
            width: 400px;
            padding: 50px 40px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h2 {
            color: var(--primary);
            text-align: center;
            letter-spacing: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

            .form-group label {
                display: block;
                font-size: 12px;
                color: #888;
                margin-bottom: 8px;
            }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(139,69,19,0.2);
            border-radius: 2px;
            outline: none;
            background: rgba(255,255,255,0.7);
        }

        .code-group {
            display: flex;
            gap: 10px;
        }

        .btn-code {
            white-space: nowrap;
            padding: 0 15px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            cursor: pointer;
        }

            .btn-code:disabled {
                color: #ccc;
                border-color: #ccc;
                cursor: not-allowed;
            }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #step2 {
            display: none;
        }

        .msg {
            font-size: 12px;
            color: #d32f2f;
            text-align: center;
            margin-bottom: 15px;
            min-height: 18px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="card">
        <div id="step1">
            <h2>找回凭证</h2>
            <div id="msg1" class="msg"></div>
            <div class="form-group">
                <label>电子邮箱</label>
                <input type="email" id="email" placeholder="注册时使用的邮箱">
            </div>
            <div class="form-group">
                <label>验证码</label>
                <div class="code-group">
                    <input type="text" id="code" placeholder="6位验证码">
                    <button class="btn-code" id="sendBtn" onclick="sendCode()">获取验证码</button>
                </div>
            </div>
            <button class="btn-submit" onclick="goToStep2()">验证身份</button>
        </div>

        <div id="step2">
            <h2>重设密码</h2>
            <div id="msg2" class="msg"></div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="newPassword" placeholder="请输入新密码">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入">
            </div>
            <button class="btn-submit" onclick="submitReset()">确认修改</button>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="login.html" style="color: var(--primary); font-size: 13px; text-decoration: none;">← 返回登录</a>
        </div>
    </div>

    <script>
        const api = axios.create({ baseURL: '/api/account' });

        // 发送验证码 - 对接 [HttpPost("forgot-password-code")]
        async function sendCode() {
            const email = document.getElementById('email').value;
            const msg1 = document.getElementById('msg1');
            msg1.innerText = '';

            if (!email) {
                msg1.innerText = "请先输入邮箱";
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                // 注意：后端使用 [FromBody] string，Axios 发送时需传字符串。
                const res = await api.post('/forgot-password-code', `"${email}"`, {
                    headers: { 'Content-Type': 'application/json' }
                });

                // 解构标准返回格式
                const { code, message } = res.data;

                if (code === 200) {
                    alert("邮件已发送，请查收");
                    let count = 60;
                    const timer = setInterval(() => {
                        sendBtn.innerText = `${count--}s`;
                        if (count < 0) {
                            clearInterval(timer);
                            sendBtn.disabled = false;
                            sendBtn.innerText = "重新获取";
                        }
                    }, 1000);
                } else {
                    msg1.innerText = message || "邮件发送失败";
                    sendBtn.disabled = false;
                }
            } catch (e) {
                msg1.innerText = e.response?.data?.message || "网络异常，发送失败";
                sendBtn.disabled = false;
            }
        }

        // 仅前端切换步骤
        function goToStep2() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const msg1 = document.getElementById('msg1');

            if (!email || !code) {
                msg1.innerText = "请填写邮箱和验证码";
                return;
            }

            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        // 提交重置 - 对接 [HttpPost("reset-password")]
        async function submitReset() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msg2 = document.getElementById('msg2');

            msg2.innerText = '';

            if (!newPassword || !confirmPassword) {
                return msg2.innerText = "请填写完整密码信息";
            }

            if (newPassword !== confirmPassword) {
                return msg2.innerText = "两次密码输入不一致";
            }

            try {
                // 对应后端的 ResetPasswordRequestDto 结构
                const payload = {
                    email: email,
                    code: code,
                    newPassword: newPassword
                };

                const res = await api.post('/reset-password', payload);

                // 解构标准返回格式
                const { code: resCode, message } = res.data;

                if (resCode === 200) {
                    alert("凭证修订成功，请重新进入族门");
                    window.location.href = "login.html";
                } else {
                    msg2.innerText = message || "重设失败，验证码可能已过期";
                }
            } catch (e) {
                msg2.innerText = e.response?.data?.message || "网络异常，重设失败";
            }
        }
    </script>
</body>
</html>
