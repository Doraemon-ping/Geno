<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - 赵氏家谱平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/forget-password.css">
    <link rel="stylesheet" href="css/ui-polish.css">
</head>
<body>
    <nav class="navbar">
        <a class="logo" href="index.html">赵氏家谱</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="public.html">万姓同根</a>
            <a href="login.html">登录</a>
            <a href="register.html">申请入谱</a>
        </div>
    </nav>

    <header class="hero">
        <h1>找回密码</h1>
        <p>按后端现有接口分两步完成：先发送邮箱验证码，再提交邮箱、验证码和新密码完成重置，随后自动返回登录页。</p>
    </header>

    <main class="container">
        <section class="panel">
            <div class="section-title">重置流程</div>
            <div class="intro-list">
                <div class="intro-card">
                    <strong>步骤一：发送验证码</strong>
                    调用 `/api/Account/forgot-password-code`，将邮箱地址作为请求体发送。
                </div>
                <div class="intro-card">
                    <strong>步骤二：确认重置</strong>
                    调用 `/api/Account/reset-password`，提交邮箱、验证码和新密码。
                </div>
                <div class="intro-card">
                    <strong>步骤三：返回登录</strong>
                    重置成功后自动跳转到登录页，继续进入你的目标页面。
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="section-title">填写重置信息</div>
            <form id="resetForm">
                <div class="field">
                    <label for="email">邮箱</label>
                    <input id="email" type="email" placeholder="请输入注册邮箱" required>
                </div>
                <div class="field">
                    <label for="code">验证码</label>
                    <div class="code-row">
                        <input id="code" type="text" placeholder="请输入邮箱验证码" required>
                        <button class="ghost-button" type="button" id="sendCodeButton">发送验证码</button>
                    </div>
                </div>
                <div class="field">
                    <label for="password">新密码</label>
                    <input id="password" type="password" placeholder="请输入新密码" required>
                </div>
                <div class="field">
                    <label for="confirmPassword">确认新密码</label>
                    <input id="confirmPassword" type="password" placeholder="请再次输入新密码" required>
                </div>
                <div class="message" id="message"></div>
                <button class="action-button" id="submitButton" type="submit">确认重置</button>
            </form>
            <div class="footer-links">
                <a class="ghost-button link-button" href="login.html">返回登录</a>
                <a class="ghost-button link-button" href="index.html">返回首页</a>
            </div>
        </section>
    </main>

    <script src="js/forget-password.js"></script>
</body>
</html>
