<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>树成员名录</title>
  <style>
    :root { --p:#8b4513; --bg:#fdfaf2; --line:rgba(139,69,19,.14); --danger:#c0392b; --ok:#2e7d32; }
    * { box-sizing:border-box; } body { margin:0; padding:88px 20px 32px; background:var(--bg); color:#3f352d; font-family:"Noto Serif SC","KaiTi",serif; }
    .nav { position:fixed; inset:0 0 auto 0; height:72px; display:flex; align-items:center; justify-content:space-between; padding:0 5%; background:rgba(255,255,255,.93); border-bottom:1px solid var(--line); z-index:10; }
    .nav a,.nav button { color:#5b5047; text-decoration:none; background:none; border:none; font:inherit; cursor:pointer; } .logo { color:var(--p); font-size:24px; font-weight:700; letter-spacing:3px; }
    .links { display:flex; gap:16px; flex-wrap:wrap; align-items:center; }
    .hero,.panel { max-width:1240px; margin:0 auto 18px; background:#fff; border:1px solid var(--line); box-shadow:0 12px 24px rgba(0,0,0,.04); }
    .hero { padding:28px; } .hero h1,.title { color:var(--p); } .hero h1 { margin:0 0 8px; }
    .panel { padding:20px; } .title { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; padding-left:12px; border-left:4px solid var(--p); font-size:22px; }
    .summary,.filters,.layout,.detail-grid { display:grid; gap:12px; } .summary { grid-template-columns:repeat(4,1fr); } .filters { grid-template-columns:repeat(4,1fr); }
    .layout { grid-template-columns:1.1fr .9fr; } .detail-grid { grid-template-columns:repeat(2,1fr); }
    .card,.list-item,.detail-block,.note,.pager { padding:12px 14px; background:#faf7f2; border:1px solid var(--line); }
    .card strong,.detail-block strong { display:block; margin-bottom:4px; color:var(--p); }
    .field label { display:block; margin-bottom:6px; color:var(--p); font-size:14px; } .field input,.field select,.field textarea { width:100%; padding:10px; border:1px solid var(--line); background:#fffdf8; font:inherit; }
    .field textarea { min-height:88px; resize:vertical; } .actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .btn,.line,.danger { padding:9px 14px; border-radius:2px; cursor:pointer; font:inherit; } .btn { border:none; background:var(--p); color:#fff; } .line { border:1px solid var(--p); background:#fff; color:var(--p); text-decoration:none; } .danger { border:1px solid rgba(192,57,43,.18); background:#fff5f5; color:var(--danger); }
    .list { display:grid; gap:12px; min-height:280px; } .list-item { cursor:pointer; } .list-item.active,.list-item:hover { border-color:rgba(139,69,19,.3); box-shadow:0 10px 20px rgba(0,0,0,.05); transform:translateY(-1px); }
    .head { display:flex; justify-content:space-between; gap:12px; margin-bottom:8px; align-items:center; } .name { font-size:20px; color:var(--p); font-weight:700; } .tags { display:flex; gap:8px; flex-wrap:wrap; } .tag { padding:4px 8px; border:1px solid var(--line); background:#fff; color:var(--p); font-size:12px; }
    .message { min-height:22px; margin-bottom:10px; color:var(--danger); } .success { color:var(--ok); } .pager { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:14px; }
    .hidden { display:none!important; } .modal { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; padding:20px; z-index:20; } .modal.show { display:flex; } .modal-card { width:min(620px,100%); background:#fff; padding:24px; border:1px solid var(--line); }
    @media (max-width:1050px) { .summary,.filters,.layout,.detail-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="logo" href="index.html">赵氏家谱</a>
    <div class="links">
      <a href="index.html">首页</a>
      <a href="my-trees.html">我的家谱</a>
      <a href="public.html">公开谱录</a>
      <a href="profile.html">个人中心</a>
      <button id="logoutBtn" type="button">退出登录</button>
    </div>
  </nav>

  <section class="hero">
    <h1 id="pageTitle">树成员名录</h1>
    <p id="pageSubtitle">按姓名、字辈、代数、世代范围和状态等条件统一筛选当前家谱树成员。</p>
  </section>

  <section class="panel">
    <div class="title">
      <span>成员总览</span>
      <div class="actions">
        <a id="detailLink" class="line" href="#">返回树详情</a>
        <a id="unionLink" class="line" href="#">婚姻单元图</a>
        <button id="createBtn" class="btn hidden" type="button">新增成员</button>
      </div>
    </div>
    <div class="summary">
      <div class="card"><strong>家谱名称</strong><span id="treeName">--</span></div>
      <div class="card"><strong>匹配数量</strong><span id="memberCount">0</span></div>
      <div class="card"><strong>分页状态</strong><span id="pageInfo">第 1 / 1 页</span></div>
      <div class="card"><strong>当前权限</strong><span id="roleName">访客</span></div>
    </div>
  </section>

  <section class="panel">
    <div class="title"><span>筛选检索</span></div>
    <div class="filters">
      <div class="field"><label for="keyword">综合关键词</label><input id="keyword" type="text" placeholder="姓名、传记、出生信息"></div>
      <div class="field"><label for="name">成员姓名</label><input id="name" type="text" placeholder="补充姓名条件"></div>
      <div class="field"><label for="poemId">字辈</label><select id="poemId"><option value="">全部字辈</option></select></div>
      <div class="field"><label for="gender">性别</label><select id="gender"><option value="">全部性别</option><option value="1">男</option><option value="2">女</option><option value="0">未知</option></select></div>
      <div class="field"><label for="generationNum">指定代数</label><input id="generationNum" type="number" min="1"></div>
      <div class="field"><label for="generationFrom">代数起始</label><input id="generationFrom" type="number" min="1"></div>
      <div class="field"><label for="generationTo">代数结束</label><input id="generationTo" type="number" min="1"></div>
      <div class="field"><label for="isLiving">在世状态</label><select id="isLiving"><option value="">全部状态</option><option value="true">在世</option><option value="false">已故</option></select></div>
    </div>
    <div class="actions" style="margin-top:12px;">
      <div class="field" style="margin:0; min-width:130px;"><label for="pageSize">每页条数</label><select id="pageSize"><option value="10">10</option><option value="20" selected>20</option><option value="50">50</option><option value="100">100</option></select></div>
      <button id="searchBtn" class="btn" type="button">查询</button>
      <button id="resetBtn" class="line" type="button">重置</button>
    </div>
  </section>

  <section class="panel">
    <div class="layout">
      <div>
        <div class="title"><span>成员列表</span></div>
        <div id="listMsg" class="message"></div>
        <div id="memberList" class="list"><div class="card">正在读取成员列表...</div></div>
        <div class="pager">
          <span id="pagerText">共 0 条记录</span>
          <div class="actions">
            <button id="prevBtn" class="line" type="button">上一页</button>
            <button id="nextBtn" class="line" type="button">下一页</button>
          </div>
        </div>
      </div>
      <div>
        <div class="title">
          <span>成员详情</span>
          <div class="actions">
            <button id="editBtn" class="line hidden" type="button">修改</button>
            <button id="deleteBtn" class="danger hidden" type="button">删除</button>
          </div>
        </div>
        <div id="detailMsg" class="message"></div>
        <div id="detailBox" class="note">请从左侧选择一位成员查看详细信息。</div>
      </div>
    </div>
  </section>

  <div id="modal" class="modal">
    <div class="modal-card">
      <h3 id="modalTitle">新增成员</h3>
      <div class="field"><label for="mLastName">姓氏</label><input id="mLastName" type="text"></div>
      <div class="field"><label for="mFirstName">名字</label><input id="mFirstName" type="text"></div>
      <div class="field"><label for="mGenerationNum">代数</label><input id="mGenerationNum" type="number" min="1"></div>
      <div class="field"><label for="mPoemId">关联字辈</label><select id="mPoemId"><option value="">不指定</option></select></div>
      <div class="field"><label for="mGender">性别</label><select id="mGender"><option value="0">未知</option><option value="1">男</option><option value="2">女</option></select></div>
      <div class="field"><label for="mBirthDateRaw">出生信息</label><input id="mBirthDateRaw" type="text"></div>
      <div class="field"><label for="mIsLiving">在世状态</label><select id="mIsLiving"><option value="true">在世</option><option value="false">已故</option></select></div>
      <div class="field"><label for="mBiography">成员简介</label><textarea id="mBiography"></textarea></div>
      <div class="actions"><button id="saveBtn" class="btn" type="button">提交</button><button id="cancelBtn" class="line" type="button">取消</button></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");
    const treeId = new URLSearchParams(location.search).get("treeId");
    if (!treeId) location.href = "public.html";
    const modal = document.getElementById("modal");
    const state = { tree:null, access:{}, poems:[], members:[], selectedId:"", selected:null, editingId:"", page:1, pageSize:20, totalCount:0, totalPages:0 };
    const get = (obj,...keys) => { for (const key of keys) if (obj && obj[key] !== undefined && obj[key] !== null) return obj[key]; return null; };
    const esc = value => String(value ?? "").replace(/[&<>\"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" }[c]));
    const memberId = item => get(item,"memberId","memberID","MemberID") || "";
    const poemId = item => get(item,"poemId","poemID","PoemID") || "";
    const fullName = item => `${get(item,"lastName","LastName") || ""}${get(item,"firstName","FirstName") || ""}` || "未命名成员";
    const genderName = v => Number(v) === 1 ? "男" : Number(v) === 2 ? "女" : "未知";
    const canDirectEdit = () => Boolean(get(state.access,"canDirectEdit","CanDirectEdit","canEdit","CanEdit"));
    const canSubmitChange = () => Boolean(get(state.access,"canSubmitChange","CanSubmitChange"));
    const poemMap = () => new Map(state.poems.map(item => [poemId(item), get(item,"word","Word") || ""]));
    function headers(json = false) { const result = {}; if (token) result.Authorization = `Bearer ${token}`; if (json) result["Content-Type"] = "application/json"; return result; }
    function show(id, text = "", ok = false) { const el = document.getElementById(id); el.textContent = text; el.className = ok ? "message success" : "message"; }
    function requireLogin() { if (token) return true; location.href = `login.html?redirect=${encodeURIComponent(`tree-members.html?treeId=${treeId}`)}`; return false; }
    async function requestJson(url, options = {}) { const r = await fetch(url, options); const t = r.headers.get("content-type") || ""; const p = t.includes("application/json") ? await r.json() : await r.text(); if (!r.ok) throw new Error(typeof p === "string" ? p : (p?.message || p?.Message || "请求失败")); return p; }
    function searchParams() {
      const v = id => document.getElementById(id).value.trim();
      const num = id => v(id) ? Number(v(id)) : null;
      const params = new URLSearchParams({ treeId, page:String(state.page), pageSize:String(state.pageSize) });
      [["keyword", v("keyword")], ["name", v("name")], ["poemId", document.getElementById("poemId").value], ["gender", document.getElementById("gender").value], ["isLiving", document.getElementById("isLiving").value]].forEach(([k,val]) => { if (val) params.set(k, val); });
      [["generationNum", num("generationNum")], ["generationFrom", num("generationFrom")], ["generationTo", num("generationTo")]].forEach(([k,val]) => { if (val !== null) params.set(k, String(val)); });
      return params.toString();
    }
    function renderSummary() {
      document.getElementById("pageTitle").textContent = `${get(state.tree,"treeName","TreeName") || "家谱树"}成员名录`;
      document.getElementById("treeName").textContent = get(state.tree,"treeName","TreeName") || "未命名家谱树";
      document.getElementById("memberCount").textContent = `${state.totalCount} 条`;
      document.getElementById("pageInfo").textContent = `第 ${state.page} / ${Math.max(state.totalPages,1)} 页`;
      document.getElementById("roleName").textContent = get(state.access,"roleName","RoleName") || "访客";
      document.getElementById("pagerText").textContent = `共 ${state.totalCount} 条记录，每页 ${state.pageSize} 条`;
      document.getElementById("prevBtn").disabled = state.page <= 1;
      document.getElementById("nextBtn").disabled = state.page >= Math.max(state.totalPages,1);
      document.getElementById("createBtn").classList.toggle("hidden", !canSubmitChange());
    }
    function renderPoems() {
      const options = state.poems.map(item => `<option value="${esc(poemId(item))}">第 ${esc(get(item,"generationNum","GenerationNum") ?? "-")} 代 · ${esc(get(item,"word","Word") || "")}</option>`).join("");
      document.getElementById("poemId").innerHTML = '<option value="">全部字辈</option>' + options;
      document.getElementById("mPoemId").innerHTML = '<option value="">不指定</option>' + options;
    }
    function renderList() {
      const list = document.getElementById("memberList");
      const poems = poemMap();
      if (!state.members.length) { list.innerHTML = '<div class="card">当前筛选条件下没有匹配的成员。</div>'; return; }
      list.innerHTML = state.members.map(item => `
        <div class="list-item ${state.selectedId === memberId(item) ? "active" : ""}" data-id="${esc(memberId(item))}">
          <div class="head"><div class="name">${esc(fullName(item))}</div><div class="tags"><span class="tag">${esc(genderName(get(item,"gender","Gender")))}</span><span class="tag">第 ${esc(get(item,"generationNum","GenerationNum") ?? "未标注")} 代</span></div></div>
          <div>字辈：${esc(poems.get(get(item,"poemId","poemID","PoemID")) || "未指定")}</div>
          <div>出生信息：${esc(get(item,"birthDateRaw","BirthDateRaw") || "未填写")}</div>
        </div>`).join("");
      list.querySelectorAll("[data-id]").forEach(el => el.addEventListener("click", () => selectMember(el.getAttribute("data-id"))));
    }
    function renderDetail() {
      const box = document.getElementById("detailBox");
      const edit = document.getElementById("editBtn");
      const del = document.getElementById("deleteBtn");
      if (!state.selected) { box.className = "note"; box.innerHTML = "请从左侧选择一位成员查看详细信息。"; edit.classList.add("hidden"); del.classList.add("hidden"); return; }
      const poems = poemMap();
      const item = state.selected;
      box.className = "";
      box.innerHTML = `
        <div class="detail-grid">
          <div class="detail-block"><strong>姓名</strong><span>${esc(fullName(item))}</span></div>
          <div class="detail-block"><strong>代数</strong><span>第 ${esc(get(item,"generationNum","GenerationNum") ?? "未标注")} 代</span></div>
          <div class="detail-block"><strong>性别</strong><span>${esc(genderName(get(item,"gender","Gender")))}</span></div>
          <div class="detail-block"><strong>在世状态</strong><span>${get(item,"isLiving","IsLiving") === false ? "已故" : "在世或未标注"}</span></div>
          <div class="detail-block"><strong>出生信息</strong><span>${esc(get(item,"birthDateRaw","BirthDateRaw") || "未填写")}</span></div>
          <div class="detail-block"><strong>关联字辈</strong><span>${esc(poems.get(get(item,"poemId","poemID","PoemID")) || "未指定")}</span></div>
        </div>
        <div class="detail-block"><strong>成员简介</strong><div>${esc(get(item,"biography","Biography") || "未填写")}</div></div>
        <div class="note" style="margin-top:12px;">${canDirectEdit() ? "你当前可以直接修改这位成员，保存后立即生效。" : canSubmitChange() ? "你当前可以提交成员变更申请，等待树拥有者或树管理员审核。" : "你当前只有查看权限。"}</div>`;
      edit.classList.toggle("hidden", !canSubmitChange());
      del.classList.toggle("hidden", !canSubmitChange());
      edit.textContent = canDirectEdit() ? "修改" : "提交修改";
      del.textContent = canDirectEdit() ? "删除" : "提交删除";
    }
    async function loadTree() { const res = await requestJson(`/api/GenoTree/Get/${treeId}`, { headers: headers() }); state.tree = res.data || res.Data || {}; state.access = get(state.tree,"access","Access") || {}; renderSummary(); }
    async function loadPoems() { const res = await requestJson(`/api/Poem/tree/${treeId}`, { headers: headers() }); const items = res.data || res.Data || []; state.poems = Array.isArray(items) ? items.slice().sort((a,b) => Number(get(a,"generationNum","GenerationNum") || 0) - Number(get(b,"generationNum","GenerationNum") || 0)) : []; renderPoems(); }
    async function loadMembers(selectFirst = false) {
      show("listMsg", "正在读取成员列表...");
      const res = await requestJson(`/api/Member/query?${searchParams()}`, { headers: headers() });
      const data = res.data || res.Data || {};
      state.members = Array.isArray(get(data,"items","Items")) ? get(data,"items","Items") : [];
      state.page = Number(get(data,"page","Page") || 1); state.pageSize = Number(get(data,"pageSize","PageSize") || state.pageSize);
      state.totalCount = Number(get(data,"totalCount","TotalCount") || 0); state.totalPages = Number(get(data,"totalPages","TotalPages") || 0);
      show("listMsg"); renderSummary(); renderList();
      if (!state.members.some(item => memberId(item) === state.selectedId)) { state.selectedId = ""; state.selected = null; renderDetail(); }
      if (selectFirst && !state.selectedId && state.members.length) await selectMember(memberId(state.members[0]));
    }
    async function selectMember(id) {
      if (!id) return;
      state.selectedId = id; renderList(); show("detailMsg", "正在读取成员详情...");
      try { const res = await requestJson(`/api/Member/Get/${encodeURIComponent(id)}`, { headers: headers() }); state.selected = res.data || res.Data || null; show("detailMsg"); renderDetail(); }
      catch (e) { show("detailMsg", e.message); }
    }
    function openModal(editing) {
      document.getElementById("modalTitle").textContent = editing ? (canDirectEdit() ? "修改成员" : "提交成员修改申请") : (canDirectEdit() ? "新增成员" : "提交成员新增申请");
      document.getElementById("saveBtn").textContent = canDirectEdit() ? "保存" : "提交审核";
      modal.classList.add("show");
    }
    function closeModal() {
      state.editingId = "";
      ["mLastName","mFirstName","mGenerationNum","mBirthDateRaw","mBiography"].forEach(id => document.getElementById(id).value = "");
      document.getElementById("mPoemId").value = ""; document.getElementById("mGender").value = "0"; document.getElementById("mIsLiving").value = "true";
      modal.classList.remove("show");
    }
    function fillForm(item) {
      document.getElementById("mLastName").value = get(item,"lastName","LastName") || "";
      document.getElementById("mFirstName").value = get(item,"firstName","FirstName") || "";
      document.getElementById("mGenerationNum").value = get(item,"generationNum","GenerationNum") || "";
      document.getElementById("mPoemId").value = get(item,"poemId","poemID","PoemID") || "";
      document.getElementById("mGender").value = String(get(item,"gender","Gender") ?? 0);
      document.getElementById("mBirthDateRaw").value = get(item,"birthDateRaw","BirthDateRaw") || "";
      document.getElementById("mIsLiving").value = get(item,"isLiving","IsLiving") === false ? "false" : "true";
      document.getElementById("mBiography").value = get(item,"biography","Biography") || "";
    }
    async function saveMember() {
      if (!requireLogin() || !canSubmitChange()) return;
      const payload = { treeId, lastName:document.getElementById("mLastName").value.trim(), firstName:document.getElementById("mFirstName").value.trim(), generationNum:Number(document.getElementById("mGenerationNum").value) || null, poemId:document.getElementById("mPoemId").value || null, gender:Number(document.getElementById("mGender").value), birthDateRaw:document.getElementById("mBirthDateRaw").value.trim(), isLiving:document.getElementById("mIsLiving").value === "true", biography:document.getElementById("mBiography").value.trim() };
      if (!payload.lastName || !payload.firstName) { show("listMsg", "请先填写成员姓氏和名字。"); return; }
      try {
        const res = state.editingId
          ? await requestJson(`/api/Member/Update/${encodeURIComponent(state.editingId)}`, { method:"PUT", headers:headers(true), body:JSON.stringify(payload) })
          : await requestJson("/api/Member/Add", { method:"POST", headers:headers(true), body:JSON.stringify(payload) });
        show("listMsg", (res?.data?.message || res?.message || "成员处理成功"), true); closeModal();
        if (res?.data?.appliedDirectly || res?.Data?.AppliedDirectly) await loadMembers(true);
      } catch (e) { show("listMsg", e.message); }
    }
    async function deleteMember() {
      if (!requireLogin() || !canSubmitChange() || !state.selectedId) return;
      if (!confirm("确定删除这位成员吗？删除后相关家庭关系也会一并逻辑删除。")) return;
      try {
        const res = await requestJson(`/api/Member/Del/${encodeURIComponent(state.selectedId)}`, { method:"DELETE", headers:headers() });
        show("listMsg", (res?.data?.message || res?.message || "成员处理成功"), true);
        if (res?.data?.appliedDirectly || res?.Data?.AppliedDirectly) { state.selectedId = ""; state.selected = null; await loadMembers(true); }
      } catch (e) { show("listMsg", e.message); }
    }
    function resetFilters() {
      ["keyword","name","generationNum","generationFrom","generationTo"].forEach(id => document.getElementById(id).value = "");
      ["poemId","gender","isLiving"].forEach(id => document.getElementById(id).value = ""); document.getElementById("pageSize").value = "20";
      state.page = 1; state.pageSize = 20; loadMembers(true).catch(e => show("listMsg", e.message));
    }
    document.getElementById("detailLink").href = `tree-detail.html?id=${encodeURIComponent(treeId)}`;
    document.getElementById("unionLink").href = `union-tree.html?treeId=${encodeURIComponent(treeId)}`;
    document.getElementById("pageSize").addEventListener("change", () => { state.page = 1; state.pageSize = Number(document.getElementById("pageSize").value) || 20; loadMembers(true).catch(e => show("listMsg", e.message)); });
    document.getElementById("searchBtn").addEventListener("click", () => { state.page = 1; state.pageSize = Number(document.getElementById("pageSize").value) || 20; loadMembers(true).catch(e => show("listMsg", e.message)); });
    document.getElementById("resetBtn").addEventListener("click", resetFilters);
    document.getElementById("prevBtn").addEventListener("click", () => { if (state.page > 1) { state.page--; loadMembers(true).catch(e => show("listMsg", e.message)); } });
    document.getElementById("nextBtn").addEventListener("click", () => { if (state.page < Math.max(state.totalPages,1)) { state.page++; loadMembers(true).catch(e => show("listMsg", e.message)); } });
    document.getElementById("createBtn").addEventListener("click", () => { if (!requireLogin() || !canSubmitChange()) return; closeModal(); openModal(false); });
    document.getElementById("editBtn").addEventListener("click", () => { if (!requireLogin() || !canSubmitChange() || !state.selected) return; state.editingId = state.selectedId; fillForm(state.selected); openModal(true); });
    document.getElementById("deleteBtn").addEventListener("click", deleteMember);
    document.getElementById("saveBtn").addEventListener("click", saveMember);
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    ["keyword","name","generationNum","generationFrom","generationTo"].forEach(id => document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") { state.page = 1; loadMembers(true).catch(err => show("listMsg", err.message)); } }));
    document.getElementById("logoutBtn").classList.toggle("hidden", !token);
    document.getElementById("logoutBtn").addEventListener("click", () => { localStorage.removeItem("token"); location.href = "index.html"; });
    modal.addEventListener("click", e => { if (e.target === modal) closeModal(); });
    Promise.all([loadTree(), loadPoems()]).then(() => loadMembers(true)).catch(e => document.getElementById("memberList").innerHTML = `<div class="card">${esc(e.message)}</div>`);
  </script>
</body>
</html>
