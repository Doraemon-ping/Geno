<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宗务审核 - 赵氏家谱平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b4513;
            --accent: #a0522d;
            --gold: #d4af37;
            --paper: #fdfaf2;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Noto Serif SC", "KaiTi", serif;
            background: var(--paper);
            color: #333;
            padding-top: 80px;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139, 69, 19, 0.1);
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 4px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a,
        .nav-links button {
            text-decoration: none;
            color: #555;
            font-size: 16px;
            background: none;
            border: none;
            font-family: inherit;
            cursor: pointer;
            padding: 0;
        }

        .nav-links a:hover,
        .nav-links button:hover {
            color: var(--primary);
        }

        .hero {
            height: 250px;
            background:
                linear-gradient(rgba(44, 30, 22, 0.46), rgba(44, 30, 22, 0.46)),
                url("https://images.unsplash.com/photo-1455390582262-044cdead277a?q=80&w=1800") center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            margin: 0 0 10px;
            font-size: 38px;
            letter-spacing: 6px;
        }

        .hero p {
            margin: 0;
            max-width: 840px;
            line-height: 1.9;
            opacity: 0.92;
        }

        .container {
            max-width: 1160px;
            margin: -40px auto 50px;
            padding: 0 20px;
        }

        .panel {
            background: white;
            padding: 28px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 22px;
            color: var(--primary);
            border-left: 5px solid var(--primary);
            padding-left: 15px;
            margin-bottom: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        .stat-card {
            background: #faf7f2;
            border-left: 3px solid var(--gold);
            padding: 16px;
            color: #666;
        }

        .stat-card strong {
            display: block;
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .task-list {
            display: grid;
            gap: 18px;
        }

        .task-card {
            border: 1px solid rgba(139, 69, 19, 0.16);
            border-radius: 4px;
            background: white;
            padding: 18px;
        }

        .task-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .task-top strong {
            color: var(--primary);
            font-size: 20px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            line-height: 1;
            background: rgba(212, 175, 55, 0.18);
            color: var(--primary);
            white-space: nowrap;
        }

        .meta,
        .detail {
            color: #666;
            line-height: 1.8;
        }

        .meta {
            display: grid;
            gap: 6px;
            margin-bottom: 14px;
        }

        .summary-box {
            margin-bottom: 14px;
            padding: 12px;
            background: #faf7f2;
            border-left: 3px solid var(--gold);
        }

        .summary-box strong {
            display: block;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .detail pre {
            margin: 10px 0 0;
            padding: 12px;
            background: #fffdf8;
            border: 1px solid rgba(139, 69, 19, 0.12);
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            font: 12px/1.7 Consolas, monospace;
        }

        .field {
            margin-top: 14px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 14px;
        }

        .field textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(139, 69, 19, 0.18);
            border-radius: 2px;
            font-family: inherit;
            background: #fffdf8;
            min-height: 88px;
            resize: vertical;
        }

        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .action-button,
        .ghost-button,
        .danger-button {
            border: none;
            padding: 10px 16px;
            border-radius: 2px;
            cursor: pointer;
            font-family: inherit;
        }

        .action-button {
            background: var(--primary);
            color: white;
        }

        .ghost-button {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .danger-button {
            background: #fff5f5;
            color: #c0392b;
        }

        .empty,
        .error {
            padding: 28px 16px;
            text-align: center;
            color: #888;
        }

        .error {
            color: #c0392b;
        }

        @media (max-width: 768px) {
            .navbar { padding: 0 20px; height: auto; min-height: 80px; }
            .hero h1 { font-size: 30px; }
            .stats { grid-template-columns: 1fr; }
            .task-top { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a class="logo" href="index.html">赵氏家谱</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="profile.html">个人中心</a>
            <a href="my-trees.html">我的族谱</a>
            <button id="logoutButton">退出</button>
        </div>
    </nav>

    <header class="hero">
        <h1>宗务审核</h1>
        <p>这里展示当前账号可处理的待审核任务。系统级提权由超级管理员处理，树相关权限和内容变更则由对应树的管理员或修谱员处理。</p>
    </header>

    <main class="container">
        <section class="panel">
            <div class="section-title">待办概览</div>
            <div class="stats">
                <div class="stat-card">
                    <strong id="pendingCount">0</strong>
                    <span>可处理待办</span>
                </div>
                <div class="stat-card">
                    <strong id="applyCount">0</strong>
                    <span>权限申请</span>
                </div>
                <div class="stat-card">
                    <strong id="contentCount">0</strong>
                    <span>树与字辈变更</span>
                </div>
            </div>
        </section>

        <section class="panel">
            <div class="section-title">待办列表</div>
            <div id="taskList" class="task-list">
                <div class="empty">正在读取待办任务...</div>
            </div>
        </section>
    </main>

    <script>
        const token = localStorage.getItem("token");
        const taskList = document.getElementById("taskList");

        if (!token) {
            location.href = "login.html?redirect=" + encodeURIComponent("admin-audit.html");
        }

        async function requestJson(url, options = {}) {
            const response = await fetch(url, options);
            const contentType = response.headers.get("content-type") || "";
            const payload = contentType.includes("application/json") ? await response.json() : await response.text();

            if (!response.ok) {
                const messageText = typeof payload === "string" ? payload : payload?.message;
                throw new Error(messageText || "请求失败");
            }

            return payload;
        }

        function getBadgeText(status) {
            return status || "未知状态";
        }

        function prettyJson(value) {
            if (value == null) return "无";
            if (typeof value === "string") {
                try {
                    return JSON.stringify(JSON.parse(value), null, 2);
                } catch {
                    return value;
                }
            }
            return JSON.stringify(value, null, 2);
        }

        function renderSummaryBlock(title, data) {
            if (!data) return "";
            return `
                <div class="summary-box">
                    <strong>${title}</strong>
                    <pre>${prettyJson(data)}</pre>
                </div>
            `;
        }

        function renderTask(task) {
            return `
                <article class="task-card">
                    <div class="task-top">
                        <strong>${task.actionName || "未命名任务"}</strong>
                        <span class="badge">${getBadgeText(task.status)}</span>
                    </div>
                    <div class="meta">
                        <span>提交人：${task.submitterName || "未知"}</span>
                        <span>提交时间：${task.createTime || "未记录"}</span>
                        <span>申请理由：${task.reason || "未填写"}</span>
                    </div>
                    <div class="detail">
                        ${renderSummaryBlock("目标树", task.treeSummary)}
                        ${renderSummaryBlock("目标对象", task.targetSummary)}
                        <div class="summary-box">
                            <strong>变更内容</strong>
                            <pre>${prettyJson(task.changeData)}</pre>
                        </div>
                    </div>
                    <div class="field">
                        <label for="note-${task.taskId}">审核备注</label>
                        <textarea id="note-${task.taskId}" placeholder="可填写通过说明或驳回原因"></textarea>
                    </div>
                    <div class="button-row">
                        <button class="action-button" onclick="processTask('${task.taskId}', 1)">通过并执行</button>
                        <button class="danger-button" onclick="processTask('${task.taskId}', 2)">驳回</button>
                    </div>
                </article>
            `;
        }

        function updateStats(tasks) {
            document.getElementById("pendingCount").textContent = tasks.length;
            document.getElementById("applyCount").textContent = tasks.filter(item =>
                item.actionCode === "ApplyAdmin" || item.actionCode === "Tree.ApplyRole"
            ).length;
            document.getElementById("contentCount").textContent = tasks.filter(item =>
                item.actionCode !== "ApplyAdmin" && item.actionCode !== "Tree.ApplyRole"
            ).length;
        }

        async function loadTasks() {
            const result = await requestJson("/api/Task/get-all", {
                method: "POST",
                headers: { Authorization: `Bearer ${token}` }
            });
            const tasks = Array.isArray(result.data) ? result.data : [];
            updateStats(tasks);

            if (!tasks.length) {
                taskList.innerHTML = '<div class="empty">当前没有你可处理的待审核任务。</div>';
                return;
            }

            taskList.innerHTML = tasks.map(renderTask).join("");
        }

        async function processTask(taskId, action) {
            const notes = document.getElementById(`note-${taskId}`)?.value?.trim() || "";
            try {
                await requestJson("/api/Task/process", {
                    method: "POST",
                    headers: {
                        Authorization: `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ taskId, action, notes })
                });
                await loadTasks();
            } catch (error) {
                alert(error.message);
            }
        }

        document.getElementById("logoutButton").addEventListener("click", () => {
            localStorage.removeItem("token");
            location.href = "index.html";
        });

        loadTasks().catch(error => {
            taskList.innerHTML = `<div class="error">${error.message}</div>`;
        });

        window.processTask = processTask;
    </script>
</body>
</html>
