<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审核台 - 赵氏家谱平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin-audit.css">
  <link rel="stylesheet" href="css/ui-polish.css">
</head>
<body>
    <nav class="navbar">
        <a class="logo" href="index.html">赵氏家谱</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="profile.html">个人中心</a>
            <a href="my-trees.html">我的族谱</a>
            <a href="admin-audit.html" class="active">审核台</a>
            <button id="logoutButton">退出</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-inner">
            <h1>宗务审核台</h1>
            <p>这里集中展示当前账号可处理的审核任务，以及系统数据库操作日志。超级管理员与管理员可在此追踪审核动作与实际落库结果。</p>
        </div>
    </header>

    <main class="container">
        <section class="stats-grid">
            <div class="card stat-card">
                <strong id="pendingCount">0</strong>
                <span>可处理任务</span>
            </div>
            <div class="card stat-card">
                <strong id="applyCount">0</strong>
                <span>权限申请</span>
            </div>
            <div class="card stat-card">
                <strong id="contentCount">0</strong>
                <span>内容变更</span>
            </div>
            <div class="card stat-card">
                <strong id="logCount">0</strong>
                <span>数据库日志</span>
            </div>
        </section>

        <section class="card">
            <h2 class="section-title">待审核任务</h2>
            <div id="taskList" class="task-list">
                <div class="empty">正在读取待审核任务...</div>
            </div>
        </section>

        <section class="card">
            <h2 class="section-title">数据库操作日志</h2>
            <div id="logList" class="log-list">
                <div class="empty">正在读取数据库日志...</div>
            </div>
        </section>
    </main>

    <script src="js/admin-audit.js"></script>
</body>
</html>
