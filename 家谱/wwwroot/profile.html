<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 赵氏宗亲平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b4513;
            --accent: #a0522d;
            --gold: #d4af37;
            --paper: #fdfaf2;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Noto Serif SC", "KaiTi", serif;
            background: var(--paper);
            color: #333;
            padding-top: 80px;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139, 69, 19, 0.1);
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 4px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a,
        .nav-links button {
            text-decoration: none;
            color: #555;
            font-size: 16px;
            background: none;
            border: none;
            font-family: inherit;
            cursor: pointer;
            padding: 0;
            position: relative;
        }

        .nav-links a:hover,
        .nav-links button:hover {
            color: var(--primary);
        }

        .nav-links a.active::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
        }

        .hero {
            height: 220px;
            background: linear-gradient(rgba(44, 30, 22, 0.46), rgba(44, 30, 22, 0.46)), url("https://images.unsplash.com/photo-1514996937319-344454492b37?q=80&w=1800") center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            margin: 0 0 10px;
            font-size: 36px;
            letter-spacing: 6px;
        }

        .hero p {
            margin: 0;
            font-size: 16px;
            opacity: 0.92;
            max-width: 760px;
            line-height: 1.9;
        }

        .container {
            max-width: 1200px;
            margin: -40px auto 50px;
            padding: 0 20px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-bottom: 24px;
        }

        .summary-card,
        .section-box {
            background: white;
            padding: 24px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        .summary-card strong {
            display: block;
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 8px;
        }

        .summary-card span {
            color: #777;
            font-size: 14px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 22px;
            color: var(--primary);
            border-left: 5px solid var(--primary);
            padding-left: 15px;
            margin-bottom: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-size: 14px;
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(139, 69, 19, 0.18);
            border-radius: 2px;
            font-family: inherit;
            background: #fffdf8;
        }

        .field textarea {
            resize: vertical;
            min-height: 110px;
        }

        .field input[readonly] {
            background: #f8f4ec;
            color: #777;
        }

        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-button,
        .ghost-button {
            border: none;
            padding: 10px 16px;
            border-radius: 2px;
            cursor: pointer;
            font-family: inherit;
        }

        .action-button {
            background: var(--primary);
            color: white;
        }

        .ghost-button {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .message {
            min-height: 24px;
            color: #c0392b;
            margin-bottom: 12px;
        }

        .success { color: #2e7d32; }

        .task-list {
            display: grid;
            gap: 16px;
        }

        .task-card {
            background: white;
            border-radius: 4px;
            border-left: 4px solid var(--primary);
            padding: 18px 20px;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.04);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }

        .task-header strong {
            color: var(--primary);
            font-size: 18px;
        }

        .task-status {
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 2px;
            background: #faf7f2;
            color: var(--accent);
        }

        .task-meta {
            color: #777;
            font-size: 13px;
            line-height: 1.8;
            margin-bottom: 10px;
        }

        .task-body {
            color: #666;
            font-size: 14px;
            line-height: 1.7;
        }

        .summary-box {
            margin-top: 10px;
            padding: 12px;
            background: #faf7f2;
            border-left: 3px solid var(--gold);
        }

        .summary-box strong {
            display: block;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .summary-box pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
            font: 12px/1.7 Consolas, monospace;
        }

        .empty {
            color: #999;
            text-align: center;
            padding: 30px 10px;
        }

        @media (max-width: 900px) {
            .summary-grid { grid-template-columns: 1fr; }
            .content-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .navbar { padding: 0 20px; height: auto; min-height: 80px; }
            .hero h1 { font-size: 30px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a class="logo" href="index.html">赵氏家谱</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="my-trees.html">我的族谱</a>
            <a href="public.html">万姓同根</a>
            <a href="profile.html" class="active">个人中心</a>
            <a href="admin-audit.html" id="auditNav" style="display:none">宗务审核</a>
            <button id="logoutBtn">退出</button>
        </div>
    </nav>

    <header class="hero">
        <h1 id="heroTitle">个人中心</h1>
        <p id="heroSubtitle">在此维护个人资料、申请系统权限，并查看你提交或处理过的审核记录。</p>
    </header>

    <div class="container">
        <div class="summary-grid">
            <div class="summary-card">
                <strong id="roleNameSummary">--</strong>
                <span>当前角色</span>
            </div>
            <div class="summary-card">
                <strong id="taskCountSummary">0</strong>
                <span>我的任务</span>
            </div>
            <div class="summary-card">
                <strong id="pendingCountSummary">0</strong>
                <span>待审核</span>
            </div>
        </div>

        <div class="content-grid">
            <div class="section-box">
                <div class="section-title">个人资料</div>
                <div id="profileMessage" class="message"></div>
                <div class="field">
                    <label for="username">用户名</label>
                    <input id="username" type="text">
                </div>
                <div class="field">
                    <label for="roleName">角色</label>
                    <input id="roleName" type="text" readonly>
                </div>
                <div class="field">
                    <label for="userId">用户 ID</label>
                    <input id="userId" type="text" readonly>
                </div>
                <div class="field">
                    <label for="email">电子邮箱</label>
                    <input id="email" type="email" placeholder="请输入有效邮箱">
                </div>
                <div class="field">
                    <label for="phone">联系电话</label>
                    <input id="phone" type="tel" placeholder="请输入 10-15 位手机号">
                </div>
                <div class="button-row">
                    <button class="action-button" id="saveProfileBtn">保存资料</button>
                    <a class="ghost-button" href="my-trees.html" style="text-decoration:none">进入我的族谱</a>
                </div>
            </div>

            <div class="section-box">
                <div class="section-title">系统权限申请</div>
                <div id="applyMessage" class="message"></div>
                <div class="field">
                    <label for="targetRole">申请角色</label>
                    <select id="targetRole">
                        <option value="1">管理员</option>
                        <option value="2">修谱员</option>
                    </select>
                </div>
                <div class="field">
                    <label for="targetUserId">目标用户</label>
                    <input id="targetUserId" type="text" readonly>
                </div>
                <div class="field">
                    <label for="applyReason">申请理由</label>
                    <textarea id="applyReason" placeholder="请说明你希望承担的职责与用途"></textarea>
                </div>
                <div class="button-row">
                    <button class="action-button" id="applyBtn">提交申请</button>
                    <a class="ghost-button" id="auditEntry" href="admin-audit.html" style="display:none;text-decoration:none">进入审核台</a>
                </div>
            </div>
        </div>

        <div class="section-box" style="margin-bottom:24px;">
            <div class="section-title">我的任务记录</div>
            <div id="taskList" class="task-list">
                <div class="empty">正在读取任务记录...</div>
            </div>
        </div>

        <div class="section-box" id="reviewSection" style="display:none;">
            <div class="section-title">我可处理的待办</div>
            <div id="reviewTaskList" class="task-list">
                <div class="empty">正在读取待办任务...</div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");
        const state = { profile: null, userId: "" };

        if (!token) {
            location.href = "login.html?redirect=profile.html";
        }

        function authHeaders(json = false) {
            const headers = { Authorization: `Bearer ${token}` };
            if (json) headers["Content-Type"] = "application/json";
            return headers;
        }

        async function requestJson(url, options = {}) {
            const response = await fetch(url, options);
            const contentType = response.headers.get("content-type") || "";
            const payload = contentType.includes("application/json") ? await response.json() : await response.text();
            if (!response.ok) {
                const message = typeof payload === "string" ? payload : payload?.message;
                throw new Error(message || "请求失败");
            }
            return payload;
        }

        function setMessage(id, text, success = false) {
            const element = document.getElementById(id);
            element.textContent = text || "";
            element.className = success ? "message success" : "message";
        }

        function prettyJson(value) {
            if (value == null) return "无";
            if (typeof value === "string") {
                try {
                    return JSON.stringify(JSON.parse(value), null, 2);
                } catch {
                    return value;
                }
            }
            return JSON.stringify(value, null, 2);
        }

        function renderSummaryBox(title, data) {
            if (!data) return "";
            return `
                <div class="summary-box">
                    <strong>${title}</strong>
                    <pre>${prettyJson(data)}</pre>
                </div>
            `;
        }

        function renderTaskCard(task) {
            return `
                <div class="task-card">
                    <div class="task-header">
                        <strong>${task.actionName || "未命名任务"}</strong>
                        <span class="task-status">${task.status || "未知状态"}</span>
                    </div>
                    <div class="task-meta">
                        提交人：${task.submitterName || "未知"}<br>
                        创建时间：${task.createTime || "未记录"}<br>
                        处理时间：${task.processTime || "待处理"}<br>
                        审核人：${task.reviewName || "待处理"}<br>
                        审核备注：${task.reviewNotes || "无"}
                    </div>
                    <div class="task-body">
                        申请理由：${task.reason || "未填写"}
                        ${renderSummaryBox("目标树", task.treeSummary)}
                        ${renderSummaryBox("目标对象", task.targetSummary)}
                        ${renderSummaryBox("变更内容", task.changeData)}
                    </div>
                </div>
            `;
        }

        async function loadProfile() {
            const result = await requestJson("/api/Account/profile", { headers: authHeaders() });
            const profile = result.data;
            state.profile = profile;
            state.userId = profile.userId || "";
            document.getElementById("heroTitle").textContent = `${profile.username} · 宗务总览`;
            document.getElementById("heroSubtitle").textContent = `当前角色为 ${profile.roleName}，你可以在此维护资料、提交申请并查看审核记录。`;
            document.getElementById("username").value = profile.username || "";
            document.getElementById("roleName").value = profile.roleName || "";
            document.getElementById("userId").value = profile.userId || "";
            document.getElementById("email").value = profile.email || "";
            document.getElementById("phone").value = profile.phone || "";
            document.getElementById("roleNameSummary").textContent = profile.roleName || "--";
            document.getElementById("targetUserId").value = profile.userId || "";

            if (profile.roleType === 0) {
                document.getElementById("auditNav").style.display = "inline";
            }
        }

        async function loadMyTasks() {
            try {
                const result = await requestJson("/api/Task/my-tasks", { headers: authHeaders() });
                const tasks = Array.isArray(result.data) ? result.data : [];
                document.getElementById("taskCountSummary").textContent = tasks.length;
                document.getElementById("pendingCountSummary").textContent = tasks.filter(item => item.status === "待审核").length;
                document.getElementById("taskList").innerHTML = tasks.length
                    ? tasks.map(renderTaskCard).join("")
                    : '<div class="empty">你目前还没有任务记录。</div>';
            } catch (error) {
                document.getElementById("taskList").innerHTML = `<div class="empty">${error.message}</div>`;
            }
        }

        async function loadReviewTasks() {
            try {
                const result = await requestJson("/api/Task/get-all", {
                    method: "POST",
                    headers: authHeaders()
                });
                const tasks = Array.isArray(result.data) ? result.data : [];
                if (tasks.length) {
                    document.getElementById("reviewSection").style.display = "block";
                    document.getElementById("auditNav").style.display = "inline";
                    document.getElementById("auditEntry").style.display = "inline-flex";
                }
                document.getElementById("reviewTaskList").innerHTML = tasks.length
                    ? tasks.slice(0, 3).map(renderTaskCard).join("")
                    : '<div class="empty">当前没有你可处理的待办任务。</div>';
            } catch (error) {
                document.getElementById("reviewTaskList").innerHTML = `<div class="empty">${error.message}</div>`;
            }
        }

        async function saveProfile() {
            setMessage("profileMessage", "");
            const payload = {
                username: document.getElementById("username").value.trim(),
                email: document.getElementById("email").value.trim(),
                phone: document.getElementById("phone").value.trim()
            };
            try {
                await requestJson("/api/Account/update-profile", {
                    method: "PUT",
                    headers: authHeaders(true),
                    body: JSON.stringify(payload)
                });
                setMessage("profileMessage", "资料保存成功。", true);
            } catch (error) {
                setMessage("profileMessage", error.message);
            }
        }

        async function submitApply() {
            setMessage("applyMessage", "");
            const payload = {
                newRole: Number(document.getElementById("targetRole").value),
                targetId: state.userId,
                reason: document.getElementById("applyReason").value.trim()
            };

            if (!payload.targetId) {
                setMessage("applyMessage", "无法识别当前用户身份，请重新登录。");
                return;
            }

            if (!payload.reason) {
                setMessage("applyMessage", "请先填写申请理由。");
                return;
            }

            try {
                await requestJson("/api/Apply/apply-admin", {
                    method: "POST",
                    headers: authHeaders(true),
                    body: JSON.stringify(payload)
                });
                setMessage("applyMessage", "申请已提交，请等待审核。", true);
                document.getElementById("applyReason").value = "";
                loadMyTasks();
            } catch (error) {
                setMessage("applyMessage", error.message);
            }
        }

        document.getElementById("saveProfileBtn").addEventListener("click", saveProfile);
        document.getElementById("applyBtn").addEventListener("click", submitApply);
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.removeItem("token");
            location.href = "index.html";
        });

        loadProfile().then(() => {
            loadMyTasks();
            loadReviewTasks();
        }).catch(() => {
            localStorage.removeItem("token");
            location.href = "login.html?redirect=profile.html";
        });
    </script>
</body>
</html>
