<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 赵氏家谱平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/ui-polish.css">
</head>
<body>
    <nav class="navbar">
        <a class="logo" href="index.html">赵氏家谱</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="my-trees.html">我的族谱</a>
            <a href="public.html">万姓同根</a>
            <a href="profile.html" class="active">个人中心</a>
            <a href="admin-audit.html" id="auditNav" style="display:none;">审核台</a>
            <button id="logoutBtn">退出</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-inner">
            <h1 id="heroTitle">个人中心</h1>
            <p id="heroSubtitle">在此维护个人资料、申请系统权限，并查看自己提交或处理过的审核记录。</p>
        </div>
    </header>

    <main class="container">
        <section class="summary-grid">
            <div class="card summary-card">
                <strong id="roleNameSummary">--</strong>
                <span>当前系统角色</span>
            </div>
            <div class="card summary-card">
                <strong id="taskCountSummary">0</strong>
                <span>我的审核任务</span>
            </div>
            <div class="card summary-card">
                <strong id="pendingCountSummary">0</strong>
                <span>待审核任务</span>
            </div>
        </section>

        <section class="content-grid">
            <div class="card">
                <h2 class="section-title">个人资料</h2>
                <div id="profileMessage" class="message"></div>
                <div class="profile-head">
                    <div id="avatarPreview" class="profile-avatar">用</div>
                    <div>
                        <strong id="profileDisplayName">未命名用户</strong>
                        <span>头像会展示在家族空间帖子与评论中，点击头像或按钮即可上传并裁剪。</span>
                        <button id="chooseAvatarBtn" class="ghost-button avatar-tip" type="button">选择图片并裁剪</button>
                    </div>
                </div>
                <input id="avatarFileInput" type="file" accept="image/jpeg,image/png,image/webp" style="display:none;">
                <input id="avatarUrl" type="hidden">
                <input id="userId" type="hidden">
                <div class="field">
                    <label for="username">用户名</label>
                    <input id="username" type="text">
                </div>
                <div class="field">
                    <label for="roleName">当前角色</label>
                    <input id="roleName" type="text" readonly>
                </div>
                <div class="field">
                    <label for="email">邮箱</label>
                    <input id="email" type="email" placeholder="请输入有效邮箱">
                </div>
                <div class="field">
                    <label for="phone">联系电话</label>
                    <input id="phone" type="tel" placeholder="请输入 10-15 位手机号">
                </div>
                <div class="button-row">
                    <button class="action-button" id="saveProfileBtn">保存资料</button>
                    <a class="ghost-button" href="my-trees.html">进入我的族谱</a>
                </div>
            </div>

            <div class="card">
                <h2 class="section-title">系统权限申请</h2>
                <div id="applyMessage" class="message"></div>
                <div class="field">
                    <label for="targetRole">申请角色</label>
                    <select id="targetRole">
                        <option value="1">管理员</option>
                        <option value="2">修谱员</option>
                    </select>
                </div>
                <div class="field">
                    <label>申请对象</label>
                    <input type="text" value="默认提交给当前登录用户" readonly>
                </div>
                <div class="field">
                    <label for="applyReason">申请理由</label>
                    <textarea id="applyReason" placeholder="请说明你希望承担的职责、具备的经验和申请原因"></textarea>
                </div>
                <div class="button-row">
                    <button class="action-button" id="applyBtn">提交申请</button>
                    <a class="ghost-button" id="auditEntry" href="admin-audit.html" style="display:none;">进入审核台</a>
                </div>
            </div>
        </section>

        <section class="card" style="margin-bottom:24px;">
            <h2 class="section-title">我的审核记录</h2>
            <div id="taskList" class="task-list">
                <div class="empty">正在读取审核记录...</div>
            </div>
        </section>

        <section class="card" id="reviewSection" style="display:none;">
            <h2 class="section-title">我可处理的待办</h2>
            <div id="reviewTaskList" class="task-list">
                <div class="empty">正在读取待办任务...</div>
            </div>
        </section>
    </main>

    <div id="avatarCropModal" class="avatar-crop-modal">
        <div class="avatar-crop-card">
            <h2 class="section-title">裁剪头像</h2>
            <div class="avatar-crop-stage">
                <canvas id="avatarCropCanvas" width="320" height="320"></canvas>
            </div>
            <div class="field">
                <label for="avatarZoom">缩放头像</label>
                <input id="avatarZoom" class="avatar-slider" type="range" min="1" max="3" step="0.01" value="1">
            </div>
            <div class="button-row">
                <button id="uploadAvatarBtn" class="action-button" type="button">上传头像</button>
                <button id="cancelAvatarBtn" class="ghost-button" type="button">取消</button>
            </div>
        </div>
    </div>

    <script src="js/profile.js"></script>
</body>
</html>
