<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人中心 - 赵氏宗亲数字化平台</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b4513;
            --primary-light: #fdfaf2;
            --accent: #d2691e;
            --danger: #ff4d4f;
            --success: #52c41a;
            --warning: #faad14;
            --gray: #999;
            --bg: #fdfaf2;
        }

        body {
            font-family: "Noto Serif SC", serif;
            background: var(--bg);
            margin: 0;
            padding-top: 80px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 25px;
            padding: 0 20px;
        }

        /* 保持原有的复古卡片风格 */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(139, 69, 19, 0.1);
        }

        .section-title {
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--primary-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        /* 个人信息美化布局 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

            .form-group label {
                font-size: 13px;
                color: var(--primary);
                margin-bottom: 8px;
                font-weight: bold;
            }

            .form-group input {
                padding: 12px;
                border: 1px solid #e0d8cf;
                border-radius: 6px;
                font-family: inherit;
                font-size: 15px;
                transition: 0.3s;
            }

                .form-group input:focus {
                    outline: none;
                    border-color: var(--primary);
                    background: #fffaf5;
                }

                .form-group input[readonly] {
                    background: #f5f5f5;
                    color: #777;
                    border-style: dashed;
                }

        /* 审批列表项 */
        .audit-item {
            border: 1px solid #f0ede9;
            margin-bottom: 15px;
            border-radius: 8px;
            padding: 20px;
            border-left: 6px solid #e0d8cf;
            background: #fff;
        }

        .status-0 {
            border-left-color: var(--warning);
        }

        .status-1 {
            border-left-color: var(--success);
        }

        .status-2 {
            border-left-color: var(--danger);
        }

        .status-3 {
            border-left-color: var(--gray);
        }

        .detail-box {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #fcfaf8;
            border-radius: 6px;
            border: 1px solid #eee;
        }

        .data-row {
            display: flex;
            margin-bottom: 8px;
            font-size: 14px;
            border-bottom: 1px solid #f9f6f2;
            padding-bottom: 4px;
        }

        .data-label {
            width: 100px;
            color: #888;
            flex-shrink: 0;
        }

        .data-value {
            font-weight: bold;
            color: #444;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }

        .todo-count {
            background: var(--danger);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main">
            <div class="card" id="user-profile-section">
                <div class="section-title">宗亲名录资料</div>
                <div class="info-grid">
                    <div class="form-group">
                        <label>族中名号 (不可更改)</label>
                        <input id="u-name" readonly>
                    </div>
                    <div class="form-group">
                        <label>联络手机</label>
                        <input id="u-phone" type="tel" placeholder="请输入联络手机">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>电子邮箱</label>
                        <input id="u-email" type="email" placeholder="请输入常用邮箱">
                    </div>
                </div>
                <button class="btn-primary" style="margin-top:20px;" onclick="saveProfile()">修订并保存</button>
            </div>

            <div class="card">
                <div class="section-title">
                    <span>族务审批中心</span>
                    <span id="main-badge" class="todo-count" style="display:none">0</span>
                </div>
                <div id="audit-list-main">正在同步模版并获取族务数据...</div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <div class="section-title" style="font-size:16px;">📜 实时通报</div>
                <div id="sidebar-list" style="font-size:13px; line-height:2.2; color:#666;"></div>
            </div>
        </div>
    </div>

    <script>
        const api = axios.create({ baseURL: '/api', headers: { Authorization: `Bearer ${localStorage.getItem('token')}` } });

        // 全局常量映射
        const RoleTypeNames = { 0: "超级管理员", 1: "管理员", 2: "编辑者", 3: "观察者" };
        const StatusMap = {
            0: "<span style='color:var(--warning)'>待审核</span>",
            1: "<span style='color:var(--success)'>已通过</span>",
            2: "<span style='color:var(--danger)'>已驳回</span>",
            3: "<span style='color:var(--gray)'>已撤回</span>"
        };
        const ActionNameMap = { "ApplyAdmin": "申请管理员权限", "Tree.ApplyRole": "申请树协作权限" };

        let cardFactoryDoc = null;

        /**
         * 加载卡片工厂模版库
         */
        async function loadCardFactory() {
            try {
                const res = await fetch('AuditCards.html');
                if (!res.ok) throw new Error("无法读取模版库");
                const html = await res.text();
                const parser = new DOMParser();
                cardFactoryDoc = parser.parseFromString(html, 'text/html');
            } catch (e) {
                console.error(e);
                document.getElementById('audit-list-main').innerHTML = "模版库加载失败，请检查 AuditCards.html";
            }
        }

        /**
         * 生成卡片 HTML
         */
        function renderCard(task) {
            if (!cardFactoryDoc) return "模版未就绪";

            let data = {};
            try {
                data = typeof task.changeData === 'string' ? JSON.parse(task.changeData) : (task.changeData || {});
            } catch (e) { console.error("解析错误", e); }

            // 【修正点 1】去除空格并规范化 ActionName 匹配
            const actionKey = task.actionName ? task.actionName.trim() : "";
            let template = cardFactoryDoc.getElementById(actionKey);
            if (!template) template = cardFactoryDoc.getElementById('DefaultCard');

            const clone = template.content.cloneNode(true);

            // 【修正点 2】使用字符串兼容模式匹配 NewRole
            const RoleTypeNames = { "0": "超级管理员", "1": "管理员", "2": "编辑者", "3": "观察者" };

            if (actionKey === 'ApplyAdmin' || actionKey === 'Tree.ApplyRole') {
                const roleEl = clone.querySelector('[data-field="NewRoleName"]');
                if (roleEl) {
                    // 确保 data.NewRole 无论数字还是字符串都能匹配
                    roleEl.innerText = RoleTypeNames[String(data.NewRole)] || "未知职务";
                }

                const reasonEl = clone.querySelector('[data-field="Reason"]');
                if (reasonEl) reasonEl.innerText = data.Reason || "未说明理由";

                const tidEl = clone.querySelector('[data-field="TargetId"]');
                if (tidEl) tidEl.innerText = data.TargetId || "-";

                // 【修正点 3】增加状态 3 (撤回) 的显示支持
                const statusEl = clone.querySelector('[data-field="StatusText"]');
                if (statusEl) {
                    const currentStatus = String(task.status);
                    statusEl.innerHTML = StatusMap[currentStatus] || `<span style="color:#999">状态码: ${currentStatus}</span>`;
                }
            } else {
                const raw = clone.querySelector('.raw-json');
                if (raw) raw.innerText = JSON.stringify(data, null, 2);
            }

            const container = document.createElement('div');
            container.appendChild(clone);
            return container.innerHTML;
        }

        async function init() {
            await loadCardFactory(); // 必须先加载模版

            // 1. 加载资料
            try {
                const p = await api.get('/Account/profile');
                if (p.data.code === 200) {
                    const u = p.data.data;
                    document.getElementById('u-name').value = u.username;
                    document.getElementById('u-email').value = u.email || '';
                    document.getElementById('u-phone').value = u.phone || '';
                }
            } catch (e) { }

            // 2. 加载任务
            loadTasks();
        }

        async function loadTasks() {
            try {
                const t = await api.post('/Task/get-all');
                const list = t.data.data || [];

                // 更新 Badge
                const pending = list.filter(i => String(i.status) === "0");
                const badge = document.getElementById('main-badge');
                badge.innerText = pending.length;
                badge.style.display = pending.length ? 'inline-block' : 'none';

                // 渲染主列表
                document.getElementById('audit-list-main').innerHTML = list.map(item => `
            <div class="audit-item status-${item.status}" id="task-${item.taskId}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <strong>${ActionNameMap[item.actionName] || item.actionName}</strong>
                        <div style="font-size:12px; color:#999; margin-top:5px;">提交人：${item.submitterName}</div>
                    </div>
                    <button class="btn-primary" style="padding:6px 12px; font-size:12px;" onclick="toggleDetail('${item.taskId}')">详情</button>
                </div>
                <div class="detail-box" id="detail-${item.taskId}">
                    ${renderCard(item)}
                    ${String(item.status) === "0" ? `
                        <div style="margin-top:15px; border-top:1px dashed #eee; padding-top:12px; display:flex; gap:10px;">
                            <button onclick="handleAudit('${item.taskId}', 1)" style="color:var(--success); border:1px solid var(--success); background:none; padding:4px 12px; cursor:pointer;">批准</button>
                            <button onclick="handleAudit('${item.taskId}', 2)" style="color:var(--danger); border:1px solid var(--danger); background:none; padding:4px 12px; cursor:pointer;">驳回</button>
                        </div>
                    ` : ''}
                </div>
            </div>
        `).join('');

                // 【修正点 4】侧边栏严格匹配状态
                document.getElementById('sidebar-list').innerHTML = list.map(i => {
                    const s = String(i.status);
                    let sLabel = "未知";
                    let sColor = "#999";

                    if (s === "0") { sLabel = "待办"; sColor = "var(--warning)"; }
                    else if (s === "1") { sLabel = "已过"; sColor = "var(--success)"; }
                    else if (s === "2") { sLabel = "驳回"; sColor = "var(--danger)"; }
                    else if (s === "3") { sLabel = "撤回"; sColor = "#999"; }

                    return `<div style="margin-bottom:8px;"><span style="color:${sColor}">[${sLabel}]</span> ${ActionNameMap[i.actionName] || i.actionName}</div>`;
                }).join('');

            } catch (e) {
                console.error("任务列表加载失败", e);
            }
        }

        function toggleDetail(id) {
            const el = document.getElementById('detail-' + id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        async function handleAudit(id, status) {
            const note = prompt("审批意见：");
            await api.post('/Task/handle', { taskId: id, status: status, reviewNotes: note });
            location.reload();
        }

        async function saveProfile() {
            const res = await api.put('/Account/update-profile', {
                email: document.getElementById('u-email').value,
                phone: document.getElementById('u-phone').value
            });
            if (res.data.code === 200) alert("名录资料修订成功！");
        }

        init();
    </script>
</body>
</html>
