<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>申请入谱 - 赵氏家谱平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        /* 保持之前的古风现代化 CSS 样式不变 */
        :root {
            --primary: #8b4513;
            --bg: #fdfaf2;
            --glass: rgba(255, 255, 255, 0.9);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Serif SC', serif;
            background: url('https://images.unsplash.com/photo-1578330132821-4912f71120c4?q=80&w=2000') center/cover;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1;
        }

        .card {
            position: relative;
            z-index: 10;
            width: 440px;
            padding: 45px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 4px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            letter-spacing: 6px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 18px;
        }

            .form-group label {
                display: block;
                font-size: 12px;
                color: #888;
                margin-bottom: 6px;
                font-weight: bold;
            }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(139,69,19,0.2);
            border-radius: 2px;
            outline: none;
            background: rgba(255,255,255,0.7);
            transition: 0.3s;
        }

            input:focus {
                border-color: var(--primary);
                background: #fff;
            }

        .code-wrap {
            display: flex;
            gap: 10px;
        }

        .btn-code {
            padding: 0 15px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }

            .btn-code:disabled {
                color: #ccc;
                border-color: #ccc;
            }

        .btn-reg {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            letter-spacing: 8px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        #msg-box {
            padding: 10px;
            font-size: 13px;
            margin-bottom: 15px;
            border-radius: 2px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <div class="card">
        <h2>登名入谱</h2>
        <div id="msg-box"></div>

        <form id="regForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>宗亲名号 (用户名)</label>
                <input type="text" id="username" placeholder="建议使用真实姓名或雅号" required>
            </div>

            <div class="form-group">
                <label>联络邮箱</label>
                <input type="email" id="email" placeholder="用于身份核验" required>
            </div>

            <div class="form-group">
                <label>身份验证码</label>
                <div class="code-wrap">
                    <input type="text" id="code" placeholder="邮件验证码" required>
                    <button type="button" class="btn-code" id="sendBtn" onclick="sendCode()">获取验证码</button>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>入门凭证 (密码)</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label>确认凭证</label>
                    <input type="password" id="confirmPassword" required>
                </div>
            </div>

            <div class="form-group">
                <label>联络手机 (可选)</label>
                <input type="text" id="phone" placeholder="选填">
            </div>

            <button type="submit" class="btn-reg">提交申请</button>
        </form>

        <div style="margin-top: 25px; text-align: center; font-size: 13px;">
            已有功名？<a href="login.html" style="color: var(--primary); font-weight: bold; text-decoration: none;">直接登录</a>
        </div>
    </div>

    <script>
        const api = axios.create({ baseURL: '/api/Account' });

        // 发送验证码 (FromBody 字符串形式)
        async function sendCode() {
            const email = document.getElementById('email').value;
            if (!email) return showMsg("请先填写邮箱", true);

            const sendBtn = document.getElementById('sendBtn');
            try {
                await api.post('/send-code', `"${email}"`, {
                    headers: { 'Content-Type': 'application/json' }
                });
                showMsg("验证码已发出，请查收邮件", false);

                let count = 60;
                sendBtn.disabled = true;
                const timer = setInterval(() => {
                    sendBtn.innerText = `${count--}s`;
                    if (count < 0) {
                        clearInterval(timer);
                        sendBtn.disabled = false;
                        sendBtn.innerText = "重新获取";
                    }
                }, 1000);
            } catch (e) {
                showMsg("发送失败，请检查邮箱地址", true);
            }
        }

        // 注册提交: 混合 Body 和 Query 参数
        async function handleRegister(event) {
            event.preventDefault();

            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const code = document.getElementById('code').value;

           

            if (password !== confirm) return showMsg("两次输入的凭证不一致", true);

            // 对应 UserRegisterDto (Body)
            const bodyPayload = {
                username: document.getElementById('username').value,
                password: password,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value
            };

            try {
                // Axios 会自动将 params 拼接到 URL 后面: /api/Account/register?code=xxxx
                await api.post('/register', bodyPayload, {
                    params: { code: code }
                });

                alert("申请成功，欢迎归宗！");
                window.location.href = "login.html";
            } catch (e) {
                const errorInfo = e.response || "注册失败，验证码错误或已失效";
                showMsg(errorInfo, true);
            }
        }

        function showMsg(text, isError) {
            const box = document.getElementById('msg-box');
            box.innerText = text;
            box.style.display = 'block';
            box.style.backgroundColor = isError ? '#fff2f0' : '#f6ffed';
            box.style.color = isError ? '#ff4d4f' : '#52c41a';
            box.style.border = `1px solid ${isError ? '#ffccc7' : '#b7eb8f'}`;
        }
    </script>
</body>
</html>
