<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚姻单元树 - 赵氏家谱平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/union-tree.css">
  <link rel="stylesheet" href="css/ui-polish.css">
</head>
<body>
    <header class="navbar">
        <a class="logo" href="index.html">赵氏家谱</a>
        <nav class="nav">
            <a id="backLink" href="public.html">返回详情</a>
            <a id="detailLink" href="public.html">查看树资料</a>
            <button id="logoutBtn" type="button">退出登录</button>
        </nav>
    </header>

    <section class="hero">
        <div>
            <h1 id="pageTitle">婚姻单元树</h1>
            <p id="pageSubtitle">以成员、婚姻单元和子女关系为主线展示整棵家谱树，适合上千上万人规模的分支浏览与关系定位。</p>
        </div>
    </section>

    <main class="wrap">
        <section class="panel">
            <div class="title">结构概览</div>
            <div class="summary-grid">
                <div class="summary-card">
                    <strong id="memberCount">0</strong>
                    成员数量
                </div>
                <div class="summary-card">
                    <strong id="unionCount">0</strong>
                    婚姻单元
                </div>
                <div class="summary-card">
                    <strong id="generationCount">0</strong>
                    代际层数
                </div>
                <div class="summary-card">
                    <strong id="stageSize">0 x 0</strong>
                    画布尺寸
                </div>
            </div>
            <div class="controls">
                <button class="btn" id="fitBtn" type="button">适应画布</button>
                <button class="btn-line" id="zoomInBtn" type="button">放大</button>
                <button class="btn-line" id="zoomOutBtn" type="button">缩小</button>
                <button class="btn-line" id="downloadSvgBtn" type="button">下载 SVG 图</button>
                <button class="btn-line" id="downloadPngBtn" type="button">下载 PNG 图</button>
            </div>
            <div class="message" id="message"></div>
        </section>

        <section class="workspace">
            <section class="panel">
                <div class="title">婚姻单元树图</div>
                <div class="viewport" id="viewport">
                    <svg class="stage" id="stage" viewBox="0 0 1200 800" width="1200" height="800" aria-label="婚姻单元树图">
                        <text class="empty" x="50%" y="50%" text-anchor="middle">正在加载家谱图...</text>
                    </svg>
                </div>
            </section>

            <aside>
                <div class="side-card" style="margin-bottom: 18px;">
                    <strong>节点说明</strong>
                    <div class="legend">
                        <div class="legend-item">
                            <span class="legend-chip" style="background:#f4efe2;"></span>
                            男性成员
                        </div>
                        <div class="legend-item">
                            <span class="legend-chip" style="background:#f8efe8;"></span>
                            女性成员
                        </div>
                        <div class="legend-item">
                            <span class="legend-chip" style="background:#efe6d5;"></span>
                            婚姻单元
                        </div>
                    </div>
                </div>

                <div class="side-card" style="margin-bottom: 18px;">
                    <strong>使用提示</strong>
                    <div>1. 鼠标拖拽可平移画布。</div>
                    <div>2. 滚轮或按钮可缩放。</div>
                    <div>3. 点击节点可查看详细信息。</div>
                    <div>4. 适合先整体浏览，再逐个定位分支。</div>
                </div>

                <div class="side-card">
                    <strong>当前节点</strong>
                    <div id="detailContent">点击左侧节点查看详细信息。</div>
                </div>
            </aside>
        </section>
    </main>

    <script src="js/union-tree.js"></script>
</body>
</html>
