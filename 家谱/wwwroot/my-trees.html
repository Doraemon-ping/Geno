<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的族谱 - 赵氏宗亲平台</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --primary: #8b4513;
            --bg: #fdfaf2;
            --paper: #fff;
        }

        body {
            margin: 0;
            font-family: "Noto Serif SC", serif;
            background: var(--bg);
            padding-top: 100px;
        }

        /* 导航栏直接复用 index.html 的样式 */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139,69,19,0.1);
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 32px;
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
            padding-bottom: 5px;
        }

        /* 现代化卡片布局 */
        .tree-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .tree-card {
            background: var(--paper);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: 0.3s;
            position: relative;
        }

            .tree-card:hover {
                transform: translateY(-10px);
                box-shadow: 0 20px 40px rgba(139,69,19,0.1);
            }

        .card-body {
            padding: 25px;
        }

        .card-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
        }

        .tag-public {
            background: #e6f7ff;
            color: #1890ff;
        }

        .tag-private {
            background: #fff7e6;
            color: #faad14;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        /* 简单弹窗样式 */
        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            width: 450px;
            padding: 40px;
            border-radius: 8px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">赵氏家谱</a>
        <div style="display:flex; gap:20px;">
            <a href="index.html" style="text-decoration:none; color:#666">首页</a>
            <a href="my-trees.html" style="text-decoration:none; color:var(--primary); font-weight:bold">我的族谱</a>
            <a href="profile.html" style="text-decoration:none; color:#666">个人中心</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">我的私有族谱</h1>
            <button class="btn btn-primary" onclick="openModal()">+ 开启新卷</button>
        </div>
        <div id="treeList" class="tree-grid">
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h3 id="mTitle" style="color:var(--primary); margin-top:0">创建新家族树</h3>
            <input type="hidden" id="treeId">
            <input type="text" id="treeName" placeholder="族谱名称 (如：清河赵氏重修支谱)">
            <input type="text" id="ancestorName" placeholder="始祖姓名">
            <input type="text" id="region" placeholder="祖籍/地区">
            <textarea id="description" placeholder="家族简述" rows="3"></textarea>
            <div style="margin:10px 0; font-size:14px">
                <input type="checkbox" id="isPublic" style="width:auto"> 允许全族公开查阅
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="saveTree()">保存卷宗</button>
            <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="closeModal()">取消</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const api = axios.create({ baseURL: '/api', headers: { Authorization: `Bearer ${token}` } });

        async function loadTrees() {
            const trees = await api.get('/GenoTree/my-trees').then(r => r.data);
            document.getElementById('treeList').innerHTML = trees.map(t => `
                    <div class="tree-card">
                        <span class="card-tag ${t.isPublic ? 'tag-public' : 'tag-private'}">${t.isPublic ? '公开' : '私有'}</span>
                        <div class="card-body">
                            <h3 style="color:var(--primary); margin:0 0 15px 0">${t.treeName}</h3>
                            <p style="font-size:14px; color:#666">始祖：${t.ancestorName || '不详'}</p>
                            <p style="font-size:14px; color:#666">地区：${t.region || '未知'}</p>
                            <div style="margin-top:20px; display:flex; gap:10px">
                                <button class="btn btn-primary" onclick="location.href='tree-detail.html?id=${t.treeID}'">管理字辈</button>
                                <button class="btn btn-outline" onclick="editTree('${t.treeID}')">修订</button>
                                <button class="btn" style="color:red" onclick="deleteTree('${t.treeID}')">删除</button>
                            </div>
                        </div>
                    </div>
                `).join('');
        }

        async function saveTree() {
            const id = document.getElementById('treeId').value;
            const dto = {
                treeName: document.getElementById('treeName').value,
                ancestorName: document.getElementById('ancestorName').value,
                region: document.getElementById('region').value,
                description: document.getElementById('description').value,
                isPublic: document.getElementById('isPublic').checked
            };
            if (id) await api.put(`/GenoTree/Update/${id}`, dto);
            else await api.post('/GenoTree/Add', dto);
            closeModal(); loadTrees();
        }

        async function editTree(id) {
            const t = await api.get(`/GenoTree/Get/${id}`).then(r => r.data);
            document.getElementById('treeId').value = t.treeID;
            document.getElementById('treeName').value = t.treeName;
            document.getElementById('ancestorName').value = t.ancestorName;
            document.getElementById('region').value = t.region;
            document.getElementById('description').value = t.description;
            document.getElementById('isPublic').checked = t.isPublic;
            document.getElementById('mTitle').innerText = "修订家族信息";
            openModal();
        }

        async function deleteTree(id) {
            if (confirm("确定要焚毁此卷宗吗？此操作不可逆。")) {
                await api.delete(`/GenoTree/Del/${id}`);
                loadTrees();
            }
        }

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        loadTrees();
    </script>
</body>
</html>
