<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审核任务</title>
  <style>
    :root{--primary:#8b4513;--accent:#a0522d;--paper:#fdfaf2;--card:rgba(255,255,255,.94);--ink:#3f352d;--muted:#7b7269;--line:rgba(139,69,19,.14);--danger:#a94442;--success:#2f6f43;--shadow:0 18px 42px rgba(78,51,31,.08)}
    *{box-sizing:border-box}body{margin:0;padding-top:80px;font-family:"Noto Serif SC","KaiTi",serif;color:var(--ink);background:radial-gradient(circle at top,rgba(212,175,55,.1),transparent 32%),linear-gradient(180deg,#f8f1e4 0%,var(--paper) 38%)}
    .nav{position:fixed;inset:0 0 auto 0;height:80px;display:flex;align-items:center;justify-content:space-between;padding:0 5%;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);z-index:10}.logo{color:var(--primary);text-decoration:none;font-size:26px;font-weight:700;letter-spacing:4px}.links{display:flex;gap:18px;flex-wrap:wrap}.links a,.links button{border:none;background:none;color:#5b534d;text-decoration:none;font:inherit;cursor:pointer;padding:0}
    .page{max-width:1320px;margin:0 auto;padding:28px 20px 54px}.hero,.panel,.stat,.task{background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:24px}.hero{padding:32px;margin-bottom:20px;background:linear-gradient(135deg,rgba(255,255,255,.92),rgba(250,245,236,.94)),url("https://images.unsplash.com/photo-1514996937319-344454492b37?q=80&w=1800") center/cover;background-blend-mode:screen}.hero h1{margin:0 0 12px;color:var(--primary);font-size:38px;letter-spacing:5px}.hero p{margin:0;max-width:840px;color:#6b5a4c;line-height:1.9}
    .summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:20px}.stat{padding:22px}.stat strong{display:block;color:var(--primary);font-size:30px;margin-bottom:8px}.stat span{color:var(--muted);font-size:14px}
    .layout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:20px;align-items:start}.panel{padding:22px}.sticky{position:sticky;top:98px}.tabs{display:inline-flex;gap:8px;padding:6px;border-radius:999px;background:#f7efe2;border:1px solid rgba(139,69,19,.12);margin-bottom:18px}.tab{border:none;background:transparent;color:var(--accent);padding:10px 16px;border-radius:999px;cursor:pointer;font:inherit}.tab.active{background:var(--primary);color:#fff;box-shadow:0 8px 20px rgba(139,69,19,.18)}
    .field{margin-bottom:14px}.field label{display:block;margin-bottom:8px;color:var(--primary);font-size:14px}.field input,.field select,.field textarea{width:100%;padding:12px 14px;border-radius:15px;border:1px solid rgba(139,69,19,.16);background:#fffdf8;color:var(--ink);font:inherit}.field textarea{min-height:90px;resize:vertical}
    .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.btn,.ghost,.danger{border-radius:14px;padding:11px 18px;font:inherit;cursor:pointer;text-decoration:none}.btn{border:none;color:#fff;background:var(--primary)}.ghost{border:1px solid rgba(139,69,19,.22);color:var(--primary);background:#fff}.danger{border:1px solid rgba(169,68,66,.22);color:var(--danger);background:#fff6f6}
    .hint{margin-top:12px;padding:14px 16px;border-radius:18px;background:#faf7f2;border:1px solid rgba(139,69,19,.08)}.hint strong{display:block;color:var(--primary);margin-bottom:6px}.hint p{margin:0;color:var(--muted);font-size:14px;line-height:1.7}
    .top{display:flex;justify-content:space-between;align-items:start;gap:16px;margin-bottom:14px}.top h2{margin:0;color:var(--primary)}.top p{margin:6px 0 0;color:var(--muted);font-size:14px;line-height:1.8}.message{min-height:24px;margin-bottom:12px;color:var(--danger)}
    .list{display:grid;gap:16px}.task{padding:22px;position:relative;overflow:hidden}.task:before{content:"";position:absolute;inset:0 auto 0 0;width:5px;background:linear-gradient(180deg,var(--primary),#d4af37)}.head{display:flex;justify-content:space-between;gap:14px;align-items:start;margin-bottom:14px}.head strong{display:block;color:var(--primary);font-size:20px;margin-bottom:6px}.head p{margin:0;color:var(--muted);font-size:14px;line-height:1.7}.badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:end}.badge{display:inline-flex;align-items:center;padding:6px 12px;border-radius:999px;font-size:12px;background:#f5ecdf;color:var(--accent)}.badge.success{background:rgba(47,111,67,.12);color:var(--success)}.badge.danger{background:rgba(169,68,66,.12);color:var(--danger)}
    .meta,.grid{display:grid;gap:10px 16px}.meta{grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:16px;padding:16px;border-radius:18px;background:#faf7f2;border:1px solid rgba(139,69,19,.08)}.meta b,.item b{display:block;margin-bottom:4px;color:#8c7e70;font-size:12px}.meta span,.item span{line-height:1.7;word-break:break-word}.section{border-radius:18px;background:#fffdf8;border:1px solid rgba(139,69,19,.1);padding:16px;margin-bottom:12px}.section h3{margin:0 0 12px;color:var(--primary);font-size:16px}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .pager{display:none;justify-content:space-between;align-items:center;gap:16px;margin-top:18px;padding-top:12px;border-top:1px solid rgba(139,69,19,.08)}.pager-text{color:var(--muted);line-height:1.7}.empty{padding:34px 18px;text-align:center;color:#8d857d;border-radius:18px;background:#faf7f2;border:1px solid var(--line)}
    @media (max-width:1120px){.summary{grid-template-columns:repeat(2,minmax(0,1fr))}.layout{grid-template-columns:1fr}.sticky{position:static}}
    @media (max-width:768px){body{padding-top:72px}.nav{height:72px;padding:0 16px}.logo{font-size:22px;letter-spacing:2px}.hero{padding:24px}.hero h1{font-size:30px;letter-spacing:3px}.summary,.meta,.grid{grid-template-columns:1fr}.top,.head,.pager{flex-direction:column;align-items:stretch}.badges{justify-content:start}}
  </style>
</head>
<body>
  <nav class="nav">
    <a class="logo" href="index.html">赵氏家谱</a>
    <div class="links">
      <a href="index.html">首页</a><a href="profile.html">个人中心</a><a href="review-tasks.html">审核任务</a><a href="data-logs.html">数据库日志</a><button id="logoutBtn" type="button">退出</button>
    </div>
  </nav>
  <main class="page">
    <section class="hero">
      <h1>审核任务</h1>
      <p>待处理与历史记录统一收在这里。页面会把任务内容整理成用户能看懂的字段卡片，让你更快判断“谁提交、改什么、为什么改”。</p>
    </section>
    <section class="summary">
      <article class="stat"><strong id="pendingCount">0</strong><span>待处理任务</span></article>
      <article class="stat"><strong id="historyCount">0</strong><span>历史记录</span></article>
      <article class="stat"><strong id="applyCount">0</strong><span>权限申请</span></article>
      <article class="stat"><strong id="contentCount">0</strong><span>内容变更</span></article>
    </section>
    <section class="layout">
      <aside class="panel sticky">
        <div class="tabs"><button id="pendingTab" class="tab active" type="button">待处理</button><button id="historyTab" class="tab" type="button">历史记录</button></div>
        <div class="field"><label for="keywordInput">关键字</label><input id="keywordInput" type="text" placeholder="任务名、提交人、家谱树、理由"></div>
        <div class="field"><label for="typeFilter">任务分类</label><select id="typeFilter"><option value="">全部类型</option><option value="apply">权限申请</option><option value="content">内容变更</option></select></div>
        <div class="field"><label for="statusFilter">历史状态</label><select id="statusFilter" disabled><option value="">全部状态</option><option value="1">审核通过</option><option value="2">审核驳回</option></select></div>
        <div class="field"><label for="pageSizeSelect">历史每页条数</label><select id="pageSizeSelect"><option value="10" selected>10</option><option value="20">20</option><option value="50">50</option></select></div>
        <div class="actions"><button id="searchBtn" class="btn" type="button">应用筛选</button><button id="resetBtn" class="ghost" type="button">重置</button></div>
        <div class="hint"><strong>切换方式</strong><p>待处理适合快速审批，历史记录适合复盘处理结果；状态筛选只在历史视图生效。</p></div>
      </aside>
      <section class="panel">
        <div class="top"><div><h2>任务列表</h2><p>这里不再直接展示原始 JSON，而是按任务类型整理成结构化字段。</p></div><div class="actions"><a class="ghost" href="profile.html">返回个人中心</a></div></div>
        <div id="message" class="message"></div>
        <div id="taskList" class="list"><div class="empty">正在读取审核任务...</div></div>
        <div id="pager" class="pager"><div id="pagerText" class="pager-text">共 0 条记录</div><div class="actions"><button id="prevBtn" class="ghost" type="button">上一页</button><button id="nextBtn" class="ghost" type="button">下一页</button></div></div>
      </section>
    </section>
  </main>
  <script>
    const token=localStorage.getItem("token");if(!token)location.href="login.html?redirect=review-tasks.html";
    const state={mode:"pending",pendingTasks:[],historyTasks:[],visibleTasks:[],historyPage:1,historyPageSize:10,historyTotalCount:0,historyTotalPages:0};
    const authHeaders=(json=false)=>{const h={Authorization:`Bearer ${token}`};if(json)h["Content-Type"]="application/json";return h;};
    async function requestJson(url,opt={}){const r=await fetch(url,opt);const t=r.headers.get("content-type")||"";const p=t.includes("application/json")?await r.json():await r.text();if(!r.ok)throw new Error(typeof p==="string"?p:(p?.message||p?.Message||"请求失败"));return p;}
    const escapeHtml=v=>String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    function toObject(v){if(v==null)return null;if(typeof v==="string"){try{return JSON.parse(v);}catch{return{value:v};}}return v;}
    function getValue(s,...names){const d=toObject(s);if(!d||typeof d!=="object")return undefined;for(const name of names){if(String(name).includes(".")){const parts=String(name).split(".");let cur=d,ok=true;for(const part of parts){const key=cur&&typeof cur==="object"?Object.keys(cur).find(i=>i.toLowerCase()===part.toLowerCase()):null;if(!key){ok=false;break;}cur=cur[key];}if(ok)return cur;}if(Object.prototype.hasOwnProperty.call(d,name))return d[name];const m=Object.keys(d).find(k=>k.toLowerCase()===String(name).toLowerCase());if(m)return d[m];}return undefined;}
    const roleText=v=>Number(v)===0?"超级管理员":Number(v)===1?"管理员":Number(v)===2?"修谱员":"访客";
    const treeRoleText=v=>Number(v)===1?"树管理员":Number(v)===2?"修谱员":"普通成员";
    const genderText=v=>Number(v)===1?"男":Number(v)===2?"女":"未知";
    const boolText=v=>v?"是":"否";
    function actionTitle(code){const m={ApplyAdmin:"申请系统权限","Tree.ApplyRole":"申请树内权限","Tree.Create":"新建家谱树","Tree.Update":"修改家谱树","Tree.Delete":"删除家谱树","Poem.Create":"新增字辈","Poem.Update":"修改字辈","Poem.Delete":"删除字辈","Member.Create":"新增树成员","Member.Update":"修改树成员","Member.Delete":"删除树成员","Union.Create":"新增婚姻单元","Union.Delete":"删除婚姻单元","UnionMember.Add":"新增家庭子女关联","UnionMember.Delete":"删除家庭子女关联"};return m[code]||code||"未命名任务";}
    const statusBadge=s=>s==="审核通过"?'<span class="badge success">审核通过</span>':s==="审核驳回"?'<span class="badge danger">审核驳回</span>':'<span class="badge">待处理</span>';
    const isApplyTask=t=>t.actionCode==="ApplyAdmin"||t.actionCode==="Tree.ApplyRole";
    function section(title,items){const valid=items.filter(i=>i&&i.value!=null&&i.value!=="");if(!valid.length)return"";return`<section class="section"><h3>${escapeHtml(title)}</h3><div class="grid">${valid.map(i=>`<div class="item"><b>${escapeHtml(i.label)}</b><span>${escapeHtml(i.value)}</span></div>`).join("")}</div></section>`;}
    function buildTaskSections(task){const c=toObject(task.changeData)||{},tree=toObject(task.treeSummary)||{},target=toObject(task.targetSummary)||{};const list=[];if(task.actionCode==="ApplyAdmin"){list.push(section("系统权限申请",[{label:"申请人",value:task.submitterName},{label:"目标角色",value:roleText(getValue(c,"newRole","NewRole"))},{label:"申请理由",value:task.reason||"未填写"}]));}
      else if(task.actionCode==="Tree.ApplyRole"){list.push(section("树权限申请",[{label:"家谱树",value:getValue(tree,"treeName","TreeName")},{label:"申请用户",value:getValue(target,"username","Username")||task.submitterName},{label:"申请角色",value:treeRoleText(getValue(c,"newRole","NewRole"))},{label:"申请理由",value:task.reason||"未填写"}]));}
      else if(task.actionCode.startsWith("Tree.")){list.push(section("家谱树信息",[{label:"家谱树名称",value:getValue(tree,"treeName","TreeName")||getValue(c,"treeName","TreeName")},{label:"始祖",value:getValue(tree,"ancestorName","AncestorName")||getValue(c,"ancestorName","AncestorName")},{label:"地区",value:getValue(tree,"region","Region")||getValue(c,"region","Region")},{label:"是否公开",value:getValue(tree,"isPublic","IsPublic")!=null?boolText(Boolean(getValue(tree,"isPublic","IsPublic"))):""},{label:"说明",value:getValue(c,"description","Description")||task.reason}]));}
      else if(task.actionCode.startsWith("Poem.")){list.push(section("字辈信息",[{label:"家谱树",value:getValue(tree,"treeName","TreeName")},{label:"代数",value:getValue(target,"generationNum","GenerationNum")||getValue(c,"generationNum","GenerationNum")},{label:"字辈",value:getValue(target,"word","Word")||getValue(c,"word","Word")},{label:"释义",value:getValue(target,"meaning","Meaning")||getValue(c,"meaning","Meaning")}]));}
      else if(task.actionCode.startsWith("Member.")){const full=getValue(target,"fullName","FullName")||`${getValue(c,"lastName","LastName")||""}${getValue(c,"firstName","FirstName")||""}`;list.push(section("成员信息",[{label:"成员姓名",value:full},{label:"家谱树",value:getValue(tree,"treeName","TreeName")},{label:"代数",value:getValue(target,"generationNum","GenerationNum")||getValue(c,"generationNum","GenerationNum")},{label:"性别",value:genderText(getValue(target,"gender","Gender")??getValue(c,"gender","Gender"))},{label:"出生信息",value:getValue(target,"birthDateRaw","BirthDateRaw")||getValue(c,"birthDateRaw","BirthDateRaw")},{label:"成员简介",value:getValue(target,"biography","Biography")||getValue(c,"biography","Biography")}]));}
      else if(task.actionCode.startsWith("UnionMember.")){list.push(section("家庭成员关联",[{label:"家谱树",value:getValue(tree,"treeName","TreeName")},{label:"子女成员",value:getValue(target,"childName","ChildName")||getValue(c,"childName","ChildName")},{label:"关系类型",value:getValue(target,"relTypeName","RelTypeName")||getValue(c,"relTypeName","RelTypeName")},{label:"排行",value:getValue(target,"childOrder","ChildOrder")||getValue(c,"childOrder","ChildOrder")},{label:"补充说明",value:task.reason||"无"}]));}
      else if(task.actionCode.startsWith("Union.")){list.push(section("婚姻单元信息",[{label:"家谱树",value:getValue(tree,"treeName","TreeName")},{label:"伴侣 1",value:getValue(target,"partner1Name","Partner1Name")||getValue(c,"partner1Name","Partner1Name")},{label:"伴侣 2",value:getValue(target,"partner2Name","Partner2Name")||getValue(c,"partner2Name","Partner2Name")},{label:"婚姻类型",value:getValue(target,"unionTypeName","UnionTypeName")||getValue(c,"unionTypeName","UnionTypeName")},{label:"结婚日期",value:getValue(target,"marriageDate","MarriageDate")||getValue(c,"marriageDate","MarriageDate")}]));}
      if(task.reviewNotes)list.push(section("审核备注",[{label:"处理意见",value:task.reviewNotes}]));return list.join("");}
    function renderTaskCard(task){const treeName=getValue(task.treeSummary,"treeName","TreeName")||"系统级任务";const labelA=task.isHistory?"处理人":"当前范围";const valueA=task.isHistory?(task.reviewName||"未记录"):treeName;const labelB=task.isHistory?"处理时间":"任务编号";const valueB=task.isHistory?(task.processTime||"未记录"):(task.taskId||"未记录");return`<article class="task"><div class="head"><div><strong>${escapeHtml(task.actionName||actionTitle(task.actionCode))}</strong><p>任务内容已经按业务字段整理，可直接阅读。</p></div><div class="badges">${statusBadge(task.status)}<span class="badge">${escapeHtml(task.taskId||"无任务编号")}</span></div></div><div class="meta"><div><b>提交人</b><span>${escapeHtml(task.submitterName||"未知用户")}</span></div><div><b>提交时间</b><span>${escapeHtml(task.createTime||"未记录")}</span></div><div><b>${escapeHtml(labelA)}</b><span>${escapeHtml(valueA)}</span></div><div><b>${escapeHtml(labelB)}</b><span>${escapeHtml(valueB)}</span></div></div>${buildTaskSections(task)}${state.mode==="pending"&&task.canProcess!==false?`<div class="field"><label for="note-${task.taskId}">处理意见</label><textarea id="note-${task.taskId}" placeholder="可填写审核说明或驳回理由"></textarea></div><div class="actions"><button class="btn" type="button" onclick="processTask('${task.taskId}',1)">通过</button><button class="danger" type="button" onclick="processTask('${task.taskId}',2)">驳回</button></div>`:""}</article>`;}
    function applyFilters(){const keyword=document.getElementById("keywordInput").value.trim().toLowerCase(),typeFilter=document.getElementById("typeFilter").value,statusFilter=document.getElementById("statusFilter").value,source=state.mode==="pending"?state.pendingTasks:state.historyTasks;state.visibleTasks=source.filter(task=>{const text=[task.actionName,task.submitterName,task.reason,task.reviewName,task.taskId,getValue(task.treeSummary,"treeName","TreeName")].join(" ").toLowerCase();const a=!keyword||text.includes(keyword);const b=!typeFilter||(typeFilter==="apply"?isApplyTask(task):!isApplyTask(task));const code=task.status==="审核通过"?"1":task.status==="审核驳回"?"2":"0";const c=state.mode!=="history"||!statusFilter||code===statusFilter;return a&&b&&c;});renderTasks();}
    function renderSummary(){document.getElementById("pendingCount").textContent=String(state.pendingTasks.length);document.getElementById("historyCount").textContent=String(state.historyTotalCount);const base=state.mode==="pending"?state.pendingTasks:state.historyTasks;document.getElementById("applyCount").textContent=String(base.filter(isApplyTask).length);document.getElementById("contentCount").textContent=String(base.filter(t=>!isApplyTask(t)).length);}
    function renderTasks(){renderSummary();document.getElementById("taskList").innerHTML=state.visibleTasks.length?state.visibleTasks.map(renderTaskCard).join(""):'<div class="empty">当前没有匹配的审核任务。</div>';const pager=document.getElementById("pager");if(state.mode==="history"){pager.style.display="flex";document.getElementById("pagerText").textContent=`共 ${state.historyTotalCount} 条记录，当前第 ${state.historyPage} / ${Math.max(state.historyTotalPages,1)} 页`;document.getElementById("prevBtn").disabled=state.historyPage<=1;document.getElementById("nextBtn").disabled=state.historyPage>=Math.max(state.historyTotalPages,1);}else pager.style.display="none";}
    async function loadPendingTasks(){const r=await requestJson("/api/Task/get-all",{method:"POST",headers:authHeaders()});state.pendingTasks=Array.isArray(r.data||r.Data)?(r.data||r.Data):[];}
    async function loadHistoryTasks(){const status=document.getElementById("statusFilter").value,q=new URLSearchParams();q.set("page",String(state.historyPage));q.set("pageSize",String(state.historyPageSize));if(status)q.set("status",status);const r=await requestJson(`/api/Task/review-history?${q.toString()}`,{headers:authHeaders()});const d=r.data||r.Data||{};state.historyTasks=Array.isArray(d.items||d.Items)?(d.items||d.Items):[];state.historyTotalCount=Number(d.totalCount||d.TotalCount||0);state.historyTotalPages=Number(d.totalPages||d.TotalPages||0);state.historyPage=Number(d.page||d.Page||state.historyPage);}
    async function refreshCurrentMode(){document.getElementById("message").textContent=state.mode==="pending"?"正在读取待处理任务...":"正在读取历史记录...";if(state.mode==="pending")await loadPendingTasks();else await loadHistoryTasks();document.getElementById("message").textContent="";applyFilters();}
    async function processTask(taskId,action){const notes=document.getElementById(`note-${taskId}`)?.value?.trim()||"";try{document.getElementById("message").textContent="正在提交审核结果...";await requestJson("/api/Task/process",{method:"POST",headers:authHeaders(true),body:JSON.stringify({taskId,action,notes})});await loadPendingTasks();await loadHistoryTasks();document.getElementById("message").textContent="";applyFilters();}catch(error){document.getElementById("message").textContent=error.message;}}
    document.getElementById("pendingTab").addEventListener("click",async()=>{state.mode="pending";document.getElementById("pendingTab").classList.add("active");document.getElementById("historyTab").classList.remove("active");document.getElementById("statusFilter").disabled=true;await refreshCurrentMode();});
    document.getElementById("historyTab").addEventListener("click",async()=>{state.mode="history";document.getElementById("historyTab").classList.add("active");document.getElementById("pendingTab").classList.remove("active");document.getElementById("statusFilter").disabled=false;await refreshCurrentMode();});
    document.getElementById("searchBtn").addEventListener("click",async()=>{state.historyPageSize=Number(document.getElementById("pageSizeSelect").value)||10;if(state.mode==="history"){state.historyPage=1;await loadHistoryTasks();}applyFilters();});
    document.getElementById("resetBtn").addEventListener("click",async()=>{document.getElementById("keywordInput").value="";document.getElementById("typeFilter").value="";document.getElementById("statusFilter").value="";document.getElementById("pageSizeSelect").value="10";state.historyPage=1;state.historyPageSize=10;await refreshCurrentMode();});
    document.getElementById("pageSizeSelect").addEventListener("change",async()=>{state.historyPageSize=Number(document.getElementById("pageSizeSelect").value)||10;if(state.mode==="history"){state.historyPage=1;await refreshCurrentMode();}});
    document.getElementById("prevBtn").addEventListener("click",async()=>{if(state.historyPage<=1)return;state.historyPage-=1;await refreshCurrentMode();});
    document.getElementById("nextBtn").addEventListener("click",async()=>{if(state.historyPage>=Math.max(state.historyTotalPages,1))return;state.historyPage+=1;await refreshCurrentMode();});
    document.getElementById("logoutBtn").addEventListener("click",()=>{localStorage.removeItem("token");location.href="index.html";});
    Promise.all([loadPendingTasks(),loadHistoryTasks()]).then(()=>{state.visibleTasks=state.pendingTasks.slice();renderTasks();}).catch(error=>{document.getElementById("message").textContent=error.message;document.getElementById("taskList").innerHTML=`<div class="empty">${escapeHtml(error.message)}</div>`;});
    window.processTask=processTask;
  </script>
</body>
</html>
