<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审核任务</title>
  <link rel="stylesheet" href="css/review-tasks.css">
  <link rel="stylesheet" href="css/ui-polish.css">
</head>
<body>
  <nav class="nav">
    <a class="logo" href="index.html">赵氏家谱</a>
    <div class="links">
      <a href="index.html">首页</a><a href="profile.html">个人中心</a><a href="review-tasks.html">审核任务</a><a href="data-logs.html">数据库日志</a><button id="logoutBtn" type="button">退出</button>
    </div>
  </nav>
  <main class="page">
    <section class="hero">
      <h1>审核任务</h1>
      <p>待处理与历史记录统一收在这里。页面会把任务内容整理成用户能看懂的字段卡片，让你更快判断“谁提交、改什么、为什么改”。</p>
    </section>
    <section class="summary">
      <article class="stat"><strong id="pendingCount">0</strong><span>待处理任务</span></article>
      <article class="stat"><strong id="historyCount">0</strong><span>历史记录</span></article>
      <article class="stat"><strong id="applyCount">0</strong><span>权限申请</span></article>
      <article class="stat"><strong id="contentCount">0</strong><span>内容变更</span></article>
    </section>
    <section class="layout">
      <aside class="panel sticky">
        <div class="tabs"><button id="pendingTab" class="tab active" type="button">待处理</button><button id="historyTab" class="tab" type="button">历史记录</button></div>
        <div class="field"><label for="keywordInput">关键字</label><input id="keywordInput" type="text" placeholder="任务名、提交人、家谱树、理由"></div>
        <div class="field"><label for="typeFilter">任务分类</label><select id="typeFilter"><option value="">全部类型</option><option value="apply">权限申请</option><option value="content">内容变更</option></select></div>
        <div class="field"><label for="statusFilter">历史状态</label><select id="statusFilter" disabled><option value="">全部状态</option><option value="1">审核通过</option><option value="2">审核驳回</option></select></div>
        <div class="field"><label for="pageSizeSelect">历史每页条数</label><select id="pageSizeSelect"><option value="10" selected>10</option><option value="20">20</option><option value="50">50</option></select></div>
        <div class="actions"><button id="searchBtn" class="btn" type="button">应用筛选</button><button id="resetBtn" class="ghost" type="button">重置</button></div>
        <div class="hint"><strong>切换方式</strong><p>待处理适合快速审批，历史记录适合复盘处理结果；状态筛选只在历史视图生效。</p></div>
      </aside>
      <section class="panel">
        <div class="top"><div><h2>任务列表</h2><p>这里不再直接展示原始 JSON，而是按任务类型整理成结构化字段。</p></div><div class="actions"><a class="ghost" href="profile.html">返回个人中心</a></div></div>
        <div id="message" class="message"></div>
        <div id="taskList" class="list"><div class="empty">正在读取审核任务...</div></div>
        <div id="pager" class="pager"><div id="pagerText" class="pager-text">共 0 条记录</div><div class="actions"><button id="prevBtn" class="ghost" type="button">上一页</button><button id="nextBtn" class="ghost" type="button">下一页</button></div></div>
      </section>
    </section>
  </main>
  <script src="js/review-tasks.js"></script>
</body>
</html>
