<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家谱详情</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8b4513;
      --accent: #a96a37;
      --gold: #d4af37;
      --paper: #fdfaf2;
      --ink: #3f352d;
      --line: rgba(139, 69, 19, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding-top: 76px;
      font-family: "Noto Serif SC", "KaiTi", serif;
      background: var(--paper);
      color: var(--ink);
    }

    .nav {
      position: fixed;
      inset: 0 0 auto 0;
      height: 76px;
      padding: 0 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      z-index: 10;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--primary);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-links a,
    .nav-links button {
      border: none;
      background: none;
      color: #5b5047;
      text-decoration: none;
      font: inherit;
      cursor: pointer;
      padding: 0;
    }

    .hero {
      padding: 56px 20px;
      text-align: center;
      color: white;
      background:
        linear-gradient(rgba(44, 30, 22, 0.5), rgba(44, 30, 22, 0.4)),
        url("https://images.unsplash.com/photo-1516546453174-5e1098a4b4af?q=80&w=1800") center/cover;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 36px;
      letter-spacing: 6px;
    }

    .hero p {
      margin: 0 auto;
      max-width: 760px;
      line-height: 1.9;
    }

    .wrap {
      max-width: 1180px;
      margin: -28px auto 40px;
      padding: 0 20px;
    }

    .panel {
      background: white;
      border-radius: 4px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
      padding: 24px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
    }

    .title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      padding-left: 14px;
      border-left: 5px solid var(--primary);
      color: var(--primary);
      font-size: 22px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .card,
    .row,
    .note {
      background: #faf7f2;
      border: 1px solid var(--line);
      padding: 12px 14px;
    }

    .card strong,
    .row strong {
      display: block;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .poems,
    .list {
      display: grid;
      gap: 12px;
    }

    .poems {
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    }

    .poem {
      background: white;
      border: 1px solid var(--line);
      border-radius: 4px;
      overflow: hidden;
    }

    .poem-head {
      padding: 10px;
      background: var(--primary);
      color: white;
      text-align: center;
      font-size: 13px;
    }

    .poem-word {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 110px;
      font-size: 38px;
      color: var(--primary);
      font-weight: 700;
    }

    .poem-meta {
      padding: 12px;
      color: #76695d;
      font-size: 13px;
      line-height: 1.7;
    }

    .actions,
    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .tag {
      padding: 5px 10px;
      border-radius: 2px;
      background: #faf7f2;
      color: var(--primary);
      font-size: 12px;
    }

    .btn,
    .line,
    .danger {
      padding: 9px 14px;
      border-radius: 2px;
      font: inherit;
      cursor: pointer;
    }

    .btn {
      border: none;
      background: var(--primary);
      color: white;
    }

    .line {
      border: 1px solid var(--primary);
      background: white;
      color: var(--primary);
      text-decoration: none;
    }

    .danger {
      border: 1px solid rgba(192, 57, 43, 0.18);
      background: #fff5f5;
      color: #c0392b;
    }

    .message {
      min-height: 22px;
      color: #c0392b;
      margin-bottom: 10px;
    }

    .success { color: #2e7d32; }
    .hidden { display: none !important; }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 20;
    }

    .modal.show { display: flex; }

    .modal-card {
      width: min(620px, 100%);
      background: white;
      border-radius: 4px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.22);
      padding: 28px;
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: var(--primary);
      font-size: 14px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: #fffdf8;
      font: inherit;
    }

    .field textarea {
      min-height: 100px;
      resize: vertical;
    }

    @media (max-width: 960px) {
      .grid,
      .summary {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      body { padding-top: 68px; }
      .nav { height: 68px; padding: 0 16px; }
      .logo { font-size: 22px; letter-spacing: 2px; }
      .hero h1 { font-size: 30px; letter-spacing: 3px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="logo" href="index.html">赵氏家谱</a>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="my-trees.html">我的家谱</a>
      <a href="public.html">公开谱录</a>
      <a href="profile.html">个人中心</a>
      <button id="logoutBtn" type="button">退出登录</button>
    </div>
  </nav>

  <header class="hero">
    <h1 id="treeTitle">家谱详情</h1>
    <p id="treeSubtitle">这里展示家谱概览、字辈信息、协作权限以及婚姻单元和成员名录的独立入口。</p>
  </header>

  <main class="wrap">
    <section class="panel">
      <div class="title">
        <span>家谱概览</span>
        <div class="actions">
          <a id="unionTreeLink" class="line" href="#">婚姻单元树</a>
          <a id="memberPageLink" class="line" href="#">成员名录</a>
          <div id="summaryTags" class="tags"></div>
        </div>
      </div>
      <div class="summary">
        <div class="card"><strong>始祖</strong><span id="ancestorName">--</span></div>
        <div class="card"><strong>地区</strong><span id="regionName">--</span></div>
        <div class="card"><strong>字辈数量</strong><span id="poemCount">0</span></div>
        <div class="card"><strong>婚姻单元</strong><span id="unionCount">0</span></div>
      </div>
    </section>

    <div class="grid">
      <div>
        <section class="panel">
          <div class="title">
            <span>字辈列表</span>
            <button id="addPoemBtn" class="btn hidden" type="button">新增字辈</button>
          </div>
          <div id="poemMessage" class="message"></div>
          <div id="editNote" class="note"></div>
          <div id="poemGrid" class="poems">
            <div class="row">正在加载字辈信息...</div>
          </div>
        </section>
      </div>

      <aside>
        <section class="panel">
          <div class="title">我的权限</div>
          <div id="accessNote" class="note">正在读取当前权限...</div>
        </section>

        <section id="applyPanel" class="panel hidden">
          <div class="title">申请树权限</div>
          <div id="applyMessage" class="message"></div>
          <div class="field">
            <label for="targetRole">申请角色</label>
            <select id="targetRole">
              <option value="1">树管理员</option>
              <option value="2">修谱员</option>
            </select>
          </div>
          <div class="field">
            <label for="applyReason">申请理由</label>
            <textarea id="applyReason" placeholder="请说明你希望承担的职责与原因"></textarea>
          </div>
          <button id="applyBtn" class="btn" type="button">提交申请</button>
        </section>

        <section id="permissionPanel" class="panel hidden">
          <div class="title">当前协作成员</div>
          <div id="permissionList" class="list"></div>
        </section>

        <section id="grantPanel" class="panel hidden">
          <div class="title">指定树管理员或修谱员</div>
          <div id="grantMessage" class="message"></div>
          <div class="field">
            <label for="userKeyword">搜索系统用户</label>
            <input id="userKeyword" type="text" placeholder="输入用户名、邮箱或手机号">
          </div>
          <button id="searchUserBtn" class="line" type="button">搜索用户</button>
          <div id="userResults" class="list"></div>
          <div class="field">
            <label for="grantRole">授权角色</label>
            <select id="grantRole">
              <option value="1">树管理员</option>
              <option value="2">修谱员</option>
            </select>
          </div>
          <div class="field">
            <label for="grantReason">授权说明</label>
            <textarea id="grantReason" placeholder="请说明授权原因"></textarea>
          </div>
          <button id="grantBtn" class="btn" type="button">确认授权</button>
        </section>
      </aside>
    </div>
  </main>

  <div id="poemModal" class="modal">
    <div class="modal-card">
      <h3 id="poemModalTitle">新增字辈</h3>
      <div class="field">
        <label for="generationNum">世代序号</label>
        <input id="generationNum" type="number" min="1">
      </div>
      <div class="field">
        <label for="poemWord">字辈汉字</label>
        <input id="poemWord" type="text" maxlength="1">
      </div>
      <div class="field">
        <label for="poemMeaning">释义说明</label>
        <textarea id="poemMeaning"></textarea>
      </div>
      <div class="actions">
        <button id="savePoemBtn" class="btn" type="button">提交</button>
        <button id="deletePoemBtn" class="danger hidden" type="button">删除</button>
        <button id="cancelPoemBtn" class="line" type="button">取消</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");
    const treeId = new URLSearchParams(location.search).get("id");
    const poemModal = document.getElementById("poemModal");
    const state = {
      tree: null,
      access: {},
      permissions: [],
      unions: [],
      poems: [],
      searchUsers: [],
      selectedGrantUserId: "",
      editingPoemId: ""
    };

    if (!treeId) {
      location.href = "public.html";
    }

    const esc = value => String(value ?? "").replace(/[&<>"']/g, char => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#39;"
    }[char]));

    const get = (obj, ...keys) => {
      for (const key of keys) {
        if (obj && obj[key] !== undefined && obj[key] !== null) return obj[key];
      }
      return null;
    };

    const poemId = poem => get(poem, "poemId", "poemID", "PoemID") || "";
    const headers = json => {
      const result = {};
      if (token) result.Authorization = `Bearer ${token}`;
      if (json) result["Content-Type"] = "application/json";
      return result;
    };

    function requireLogin() {
      if (token) return true;
      location.href = `login.html?redirect=${encodeURIComponent(`tree-detail.html?id=${treeId}`)}`;
      return false;
    }

    function showMessage(id, text = "", success = false) {
      const element = document.getElementById(id);
      element.textContent = text;
      element.className = success ? "message success" : "message";
    }

    function workflowMessage(result, fallback) {
      return result?.data?.message || result?.message || fallback;
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, options);
      const contentType = response.headers.get("content-type") || "";
      const payload = contentType.includes("application/json") ? await response.json() : await response.text();
      if (!response.ok) {
        throw new Error(typeof payload === "string" ? payload : (payload?.message || "请求失败"));
      }
      return payload;
    }

    const canDirectEdit = () => Boolean(get(state.access, "canDirectEdit", "CanDirectEdit", "canEdit", "CanEdit"));
    const canSubmitChange = () => Boolean(get(state.access, "canSubmitChange", "CanSubmitChange"));
    const canManagePermissions = () => Boolean(get(state.access, "canManagePermissions", "CanManagePermissions"));

    function renderSummary() {
      const tree = state.tree || {};
      const access = state.access || {};
      const isPublic = Boolean(get(tree, "isPublic", "IsPublic"));
      const direct = canDirectEdit();
      const submit = canSubmitChange();
      const manage = canManagePermissions();

      document.getElementById("treeTitle").textContent = get(tree, "treeName", "TreeName") || "家谱详情";
      document.getElementById("treeSubtitle").textContent =
        get(tree, "description", "Description") ||
        "这里展示家谱概览、字辈信息、协作权限以及婚姻单元和成员名录的独立入口。";
      document.getElementById("ancestorName").textContent = get(tree, "ancestorName", "AncestorName") || "未填写";
      document.getElementById("regionName").textContent = get(tree, "region", "Region") || "未填写";
      document.getElementById("poemCount").textContent = String(state.poems.length);
      document.getElementById("unionCount").textContent = String(state.unions.length);

      document.getElementById("summaryTags").innerHTML = [
        `<span class="tag">${esc(get(access, "roleName", "RoleName") || "访客")}</span>`,
        `<span class="tag">${isPublic ? "公开树" : "私有树"}</span>`,
        `<span class="tag">${direct ? "可直接处理" : submit ? "提交后审核" : "只读查看"}</span>`
      ].join("");

      document.getElementById("editNote").textContent = direct
        ? "你当前可以直接处理本树内容，字辈变更会立即生效。"
        : submit
          ? "你当前可以参与修谱，但字辈变更会先进入审核任务。"
          : isPublic
            ? "你当前只有公开查看权限。如需参与修谱，请先申请成为本树修谱员或树管理员。"
            : "这是私有树。只有拥有者、树管理员和授权修谱员可以查看或维护。";

      document.getElementById("accessNote").textContent = manage
        ? `当前身份：${get(access, "roleName", "RoleName") || "树管理员"}。你可以直接管理本树的协作权限。`
        : submit
          ? `当前身份：${get(access, "roleName", "RoleName") || "修谱员"}。你可以提交树内容修改，等待审核。`
          : isPublic
            ? "当前身份：访客。你可以查看公开内容，如需参与修谱可先提交树权限申请。"
            : "当前身份：访客。私有树仅对拥有者、树管理员和修谱员开放。";

      document.getElementById("applyPanel").classList.toggle("hidden", !(token && isPublic && !manage));
      document.getElementById("grantPanel").classList.toggle("hidden", !manage);
      document.getElementById("permissionPanel").classList.toggle("hidden", state.permissions.length === 0);
      document.getElementById("addPoemBtn").classList.toggle("hidden", !submit);
      document.getElementById("addPoemBtn").textContent = direct ? "新增字辈" : "提交字辈申请";
    }

    function renderPermissions() {
      const element = document.getElementById("permissionList");
      if (!state.permissions.length) {
        element.innerHTML = '<div class="row">当前还没有展示中的协作成员。</div>';
        return;
      }

      element.innerHTML = state.permissions.map(item => `
        <div class="row">
          <strong>${esc(get(item, "username", "Username") || "未命名用户")} · ${esc(get(item, "roleName", "RoleName") || "成员")}${get(item, "isOwner", "IsOwner") ? "（拥有者）" : ""}</strong>
          <div>邮箱：${esc(get(item, "email", "Email") || "未填写")}</div>
          <div>电话：${esc(get(item, "phone", "Phone") || "未填写")}</div>
        </div>
      `).join("");
    }

    function renderPoems() {
      const element = document.getElementById("poemGrid");
      const submit = canSubmitChange();
      const direct = canDirectEdit();

      if (!state.poems.length) {
        element.innerHTML = '<div class="row">当前还没有字辈。</div>';
        return;
      }

      element.innerHTML = state.poems.map(poem => `
        <div class="poem">
          <div class="poem-head">第 ${esc(get(poem, "generationNum", "GenerationNum") ?? "-")} 代</div>
          <div class="poem-word">${esc(get(poem, "word", "Word") || "")}</div>
          <div class="poem-meta">
            <div>${esc(get(poem, "meaning", "Meaning") || "暂无释义说明")}</div>
            ${submit ? `<div class="actions" style="margin-top:10px;"><button class="line" type="button" onclick="editPoem('${poemId(poem)}')">${direct ? "编辑" : "提交修改"}</button></div>` : ""}
          </div>
        </div>
      `).join("");
    }

    function renderUsers() {
      const element = document.getElementById("userResults");
      if (!state.searchUsers.length) {
        element.innerHTML = '<div class="row">暂无匹配的系统用户。</div>';
        return;
      }

      element.innerHTML = state.searchUsers.map(user => {
        const id = get(user, "userId", "UserId", "UserID") || "";
        const selected = state.selectedGrantUserId === id;
        return `
          <div class="row">
            <strong>${esc(get(user, "username", "Username") || "未命名用户")}${selected ? "（已选中）" : ""}</strong>
            <div>邮箱：${esc(get(user, "email", "Email") || "未填写")}</div>
            <div>电话：${esc(get(user, "phone", "Phone") || "未填写")}</div>
            <div class="actions" style="margin-top:8px;">
              <button class="${selected ? "btn" : "line"}" type="button" onclick="selectGrantUser('${id}')">${selected ? "当前已选择" : "选择此用户"}</button>
            </div>
          </div>
        `;
      }).join("");
    }

    async function loadTree() {
      const result = await requestJson(`/api/GenoTree/Get/${treeId}`, { headers: headers() });
      state.tree = result.data || {};
      state.access = get(state.tree, "access", "Access") || {};
      state.permissions = Array.isArray(get(state.tree, "permissions", "Permissions")) ? get(state.tree, "permissions", "Permissions") : [];
      state.unions = Array.isArray(get(state.tree, "unions", "Unions")) ? get(state.tree, "unions", "Unions") : [];
      renderSummary();
      renderPermissions();
    }

    async function loadPoems() {
      const result = await requestJson(`/api/Poem/tree/${treeId}`, { headers: headers() });
      state.poems = Array.isArray(result.data)
        ? result.data.slice().sort((a, b) => Number(get(a, "generationNum", "GenerationNum") || 0) - Number(get(b, "generationNum", "GenerationNum") || 0))
        : [];
      renderPoems();
      renderSummary();
    }

    function openPoemModal(editing) {
      const direct = canDirectEdit();
      document.getElementById("poemModalTitle").textContent = editing
        ? (direct ? "修改字辈" : "提交字辈修改申请")
        : (direct ? "新增字辈" : "提交字辈新增申请");
      document.getElementById("savePoemBtn").textContent = direct ? "保存" : "提交审核";
      document.getElementById("deletePoemBtn").classList.toggle("hidden", !editing);
      poemModal.classList.add("show");
    }

    function closePoemModal() {
      state.editingPoemId = "";
      document.getElementById("generationNum").value = "";
      document.getElementById("poemWord").value = "";
      document.getElementById("poemMeaning").value = "";
      document.getElementById("deletePoemBtn").classList.add("hidden");
      poemModal.classList.remove("show");
    }

    function editPoem(id) {
      if (!canSubmitChange()) return;
      const poem = state.poems.find(item => poemId(item) === id);
      if (!poem) return;

      state.editingPoemId = id;
      document.getElementById("generationNum").value = get(poem, "generationNum", "GenerationNum") || "";
      document.getElementById("poemWord").value = get(poem, "word", "Word") || "";
      document.getElementById("poemMeaning").value = get(poem, "meaning", "Meaning") || "";
      openPoemModal(true);
    }

    async function savePoem() {
      if (!requireLogin() || !canSubmitChange()) return;

      showMessage("poemMessage");
      const payload = {
        treeId,
        generationNum: Number(document.getElementById("generationNum").value),
        word: document.getElementById("poemWord").value.trim(),
        meaning: document.getElementById("poemMeaning").value.trim()
      };

      if (!payload.generationNum || !payload.word) {
        showMessage("poemMessage", "请填写世代序号和字辈汉字。");
        return;
      }

      try {
        const result = state.editingPoemId
          ? await requestJson(`/api/Poem/Update?poemId=${encodeURIComponent(state.editingPoemId)}`, {
              method: "PUT",
              headers: headers(true),
              body: JSON.stringify(payload)
            })
          : await requestJson("/api/Poem/Add", {
              method: "POST",
              headers: headers(true),
              body: JSON.stringify(payload)
            });

        showMessage("poemMessage", workflowMessage(result, "字辈处理成功"), true);
        closePoemModal();
        if (result?.data?.appliedDirectly) {
          await loadPoems();
        }
      } catch (error) {
        showMessage("poemMessage", error.message);
      }
    }

    async function deletePoem() {
      if (!requireLogin() || !canSubmitChange() || !state.editingPoemId) return;
      if (!confirm("确定删除这个字辈吗？")) return;

      try {
        const result = await requestJson(`/api/Poem/Del/${encodeURIComponent(state.editingPoemId)}`, {
          method: "DELETE",
          headers: headers()
        });

        showMessage("poemMessage", workflowMessage(result, "字辈处理成功"), true);
        closePoemModal();
        if (result?.data?.appliedDirectly) {
          await loadPoems();
        }
      } catch (error) {
        showMessage("poemMessage", error.message);
      }
    }

    async function applyRole() {
      if (!requireLogin()) return;

      showMessage("applyMessage");
      const reason = document.getElementById("applyReason").value.trim();
      if (!reason) {
        showMessage("applyMessage", "请先填写申请理由。");
        return;
      }

      try {
        const result = await requestJson("/api/Apply/apply-tree-role", {
          method: "POST",
          headers: headers(true),
          body: JSON.stringify({
            treeId,
            newRole: Number(document.getElementById("targetRole").value),
            reason
          })
        });

        showMessage("applyMessage", workflowMessage(result, "申请已提交。"), true);
        document.getElementById("applyReason").value = "";
      } catch (error) {
        showMessage("applyMessage", error.message);
      }
    }

    async function searchUsers() {
      if (!requireLogin()) return;

      showMessage("grantMessage");
      try {
        const result = await requestJson(
          `/api/Account/search-users?keyword=${encodeURIComponent(document.getElementById("userKeyword").value.trim())}&take=8`,
          { headers: headers() }
        );
        state.searchUsers = Array.isArray(result.data) ? result.data : [];
        renderUsers();
      } catch (error) {
        showMessage("grantMessage", error.message);
      }
    }

    function selectGrantUser(id) {
      state.selectedGrantUserId = id;
      renderUsers();
    }

    async function submitGrantRole() {
      if (!requireLogin()) return;

      showMessage("grantMessage");
      if (!state.selectedGrantUserId) {
        showMessage("grantMessage", "请先选择要授权的系统用户。");
        return;
      }

      const reason = document.getElementById("grantReason").value.trim();
      if (!reason) {
        showMessage("grantMessage", "请填写授权说明。");
        return;
      }

      try {
        const result = await requestJson("/api/Apply/apply-tree-role", {
          method: "POST",
          headers: headers(true),
          body: JSON.stringify({
            treeId,
            newRole: Number(document.getElementById("grantRole").value),
            reason,
            targetUserId: state.selectedGrantUserId
          })
        });

        showMessage("grantMessage", workflowMessage(result, "授权处理成功。"), true);
        document.getElementById("grantReason").value = "";
        await loadTree();
      } catch (error) {
        showMessage("grantMessage", error.message);
      }
    }

    document.getElementById("unionTreeLink").href = `union-tree.html?treeId=${encodeURIComponent(treeId)}`;
    document.getElementById("memberPageLink").href = `tree-members.html?treeId=${encodeURIComponent(treeId)}`;
    document.getElementById("addPoemBtn").addEventListener("click", () => {
      if (!requireLogin() || !canSubmitChange()) return;
      openPoemModal(false);
    });
    document.getElementById("savePoemBtn").addEventListener("click", savePoem);
    document.getElementById("deletePoemBtn").addEventListener("click", deletePoem);
    document.getElementById("cancelPoemBtn").addEventListener("click", closePoemModal);
    document.getElementById("applyBtn").addEventListener("click", applyRole);
    document.getElementById("searchUserBtn").addEventListener("click", searchUsers);
    document.getElementById("grantBtn").addEventListener("click", submitGrantRole);
    document.getElementById("logoutBtn").classList.toggle("hidden", !token);
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("token");
      location.href = "index.html";
    });
    poemModal.addEventListener("click", event => {
      if (event.target === poemModal) closePoemModal();
    });

    Promise.all([loadTree(), loadPoems()]).catch(error => {
      document.getElementById("poemGrid").innerHTML = `<div class="row">${esc(error.message)}</div>`;
    });

    window.editPoem = editPoem;
    window.selectGrantUser = selectGrantUser;
  </script>
</body>
</html>
