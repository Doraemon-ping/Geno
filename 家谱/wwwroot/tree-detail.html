<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字辈卷轴 - 赵氏宗亲平台</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --primary: #8b4513;
            --accent: #a0522d;
            --paper: #fdfaf2;
            --ink: #2c1e16;
        }

        body {
            margin: 0;
            font-family: "Noto Serif SC", "楷体", serif;
            background: var(--paper);
            color: var(--ink);
            padding-top: 100px;
        }

        /* --- 导航栏 (全站统一) --- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139, 69, 19, 0.1);
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* --- 家族树头部概览 --- */
        .tree-header {
            background: white;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            border-left: 10px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tree-info h1 {
            margin: 0;
            font-size: 28px;
            color: var(--primary);
        }

        .tree-info p {
            margin: 10px 0 0;
            color: #777;
            font-size: 14px;
        }

        /* --- 字辈活字布局 --- */
        .poem-section {
            background: white;
            padding: 50px;
            min-height: 600px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            position: relative;
            background-image: radial-gradient(var(--paper) 1px, transparent 0);
            background-size: 20px 20px; /* 模拟稿纸微纹 */
        }

        .poem-title {
            text-align: center;
            font-size: 24px;
            letter-spacing: 15px;
            color: var(--primary);
            margin-bottom: 50px;
            border-bottom: 1px double var(--primary);
            padding-bottom: 20px;
        }

        .poem-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
        }

        /* 单个字辈块 */
        .poem-item {
            width: 80px;
            height: 120px;
            border: 1px solid var(--primary);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.3s;
            background: #fff;
        }

            .poem-item:hover {
                transform: translateY(-8px);
                box-shadow: 0 10px 20px rgba(139, 69, 19, 0.15);
                background: var(--paper);
            }

            .poem-item .gen {
                font-size: 12px;
                background: var(--primary);
                color: #fff;
                padding: 4px 0;
                text-align: center;
                font-family: sans-serif;
            }

            .poem-item .word {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 36px;
                font-weight: bold;
                color: var(--primary);
            }

        /* --- 交互组件 --- */
        .btn {
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        #modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background: #fff;
            width: 380px;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            text-align: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">赵氏家谱</a>
        <div style="display:flex; gap:20px;">
            <a href="index.html" style="text-decoration:none; color:#666">首页</a>
            <a href="my-trees.html" style="text-decoration:none; color:#666">我的族谱</a>
            <a href="javascript:history.back()" style="text-decoration:none; color:var(--primary); font-weight:bold">← 返回</a>
        </div>
    </nav>

    <div class="container">
        <div class="tree-header">
            <div class="tree-info">
                <h1 id="treeNameHeader">载入中...</h1>
                <p id="treeMeta">始祖：-- | 地区：--</p>
            </div>
            <button class="btn btn-primary" onclick="showAddPoem()">+ 续写字辈</button>
        </div>

        <div class="poem-section">
            <div class="poem-title">宗 族 字 辈 谱</div>
            <div id="poemList" class="poem-grid">
            </div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-box">
            <h3 id="modalTitle" style="color:var(--primary); margin-top:0;">修订字辈</h3>
            <input type="hidden" id="currentPoemId">

            <div style="font-size: 13px; color: #888;">世代序号 (如: 12)</div>
            <input type="number" id="genInput" placeholder="世代">

            <div style="font-size: 13px; color: #888;">字辈汉字</div>
            <input type="text" id="wordInput" placeholder="汉字" maxlength="1">

            <div style="font-size: 13px; color: #888;">释义 (可选)</div>
            <textarea id="meaningInput" placeholder="字义补充说明..." rows="2" style="font-size: 14px; text-align: left;"></textarea>

            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
                <button class="btn btn-primary" onclick="submitPoem()">确认保存</button>
                <button id="delBtn" class="btn" style="color: red; display: none; background:#fff1f0" onclick="deletePoem()">删除此项</button>
                <button class="btn btn-outline" onclick="hideModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const urlParams = new URLSearchParams(window.location.search);
        const treeId = urlParams.get('id');

        const api = axios.create({
            baseURL: '/api',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        window.onload = () => {
            if (!token || !treeId) return location.href = 'login.html';
            initData();
        };

        async function initData() {
            try {
                // 1. 获取家族树基本资料
                const tree = await api.get(`/GenoTree/Get/${treeId}`).then(r => r.data);
                document.getElementById('treeNameHeader').innerText = tree.treeName;
                document.getElementById('treeMeta').innerText = `始祖：${tree.ancestorName || '未详'} | 地区：${tree.region || '未载'}`;

                // 2. 获取字辈列表
                loadPoemList();
            } catch (e) {
                console.error("加载数据失败", e);
            }
        }

        async function loadPoemList() {
            const res = await api.get(`/Poem/tree/${treeId}`).then(r => r.data);
            const list = res.data || [];

            // 按世代排序
            list.sort((a, b) => a.generationNum - b.generationNum);

            const container = document.getElementById('poemList');
            if (list.length === 0) {
                container.innerHTML = `<p style="color:#999; margin-top:100px; font-style:italic;">虚位以待，请点击上方按钮添加第一世字辈。</p>`;
                return;
            }

            container.innerHTML = list.map(p => `
                    <div class="poem-item" onclick="showEditPoem('${p.poemID}', ${p.generationNum}, '${p.word}', '${p.meaning || ''}')">
                        <div class="gen">第${p.generationNum}世</div>
                        <div class="word">${p.word}</div>
                    </div>
                `).join('');
        }

        // 弹窗逻辑
        function showAddPoem() {
            resetModal();
            document.getElementById('modalTitle').innerText = "续写字辈";
            document.getElementById('modal').style.display = 'flex';
        }

        function showEditPoem(id, gen, word, meaning) {
            resetModal();
            document.getElementById('currentPoemId').value = id;
            document.getElementById('genInput').value = gen;
            document.getElementById('wordInput').value = word;
            document.getElementById('meaningInput').value = meaning;
            document.getElementById('modalTitle').innerText = "修订字辈";
            document.getElementById('delBtn').style.display = 'block';
            document.getElementById('modal').style.display = 'flex';
        }

        function hideModal() { document.getElementById('modal').style.display = 'none'; }
        function resetModal() {
            document.getElementById('currentPoemId').value = "";
            document.getElementById('genInput').value = "";
            document.getElementById('wordInput').value = "";
            document.getElementById('meaningInput').value = "";
            document.getElementById('delBtn').style.display = 'none';
        }

        // 提交数据
        async function submitPoem() {
            const poemId = document.getElementById('currentPoemId').value;
            const dto = {
                treeId: treeId,
                generationNum: parseInt(document.getElementById('genInput').value),
                word: document.getElementById('wordInput').value,
                meaning: document.getElementById('meaningInput').value
            };

            try {
                if (poemId) {
                    // 对接 PUT /api/Poem/Update?poemId={id}
                    await api.put(`/Poem/Update?poemId=${poemId}`, dto);
                } else {
                    // 对接 POST /api/Poem/Add
                    await api.post('/Poem/Add', dto);
                }
                hideModal();
                loadPoemList();
            } catch (e) {
                alert("保存失败，请检查世代序号是否重复或格式错误。");
            }
        }

        // 删除数据
        async function deletePoem() {
            const id = document.getElementById('currentPoemId').value;
            if (!confirm("确定要永久移除此世代字辈吗？")) return;

            try {
                await api.delete(`/Poem/Del/${id}`);
                hideModal();
                loadPoemList();
            } catch (e) {
                alert("删除失败");
            }
        }
    </script>
</body>
</html>
