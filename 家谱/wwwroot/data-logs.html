<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据库日志</title>
  <link rel="stylesheet" href="css/data-logs.css">
  <link rel="stylesheet" href="css/ui-polish.css">
</head>
<body>
  <nav class="nav">
    <a class="logo" href="index.html">赵氏家谱</a>
    <div class="links">
      <a href="index.html">首页</a>
      <a href="profile.html">个人中心</a>
      <a href="review-tasks.html">审核任务</a>
      <a href="data-logs.html">数据库日志</a>
      <button id="logoutBtn" type="button">退出</button>
    </div>
  </nav>

  <main class="page">
    <section class="hero">
      <h1>数据库日志</h1>
    </section>

    <section class="summary">
      <article class="stat">
        <strong id="totalCount">0</strong>
        <span>匹配日志</span>
      </article>
      <article class="stat">
        <strong id="pageInfo">第 1 / 1 页</strong>
        <span>分页状态</span>
      </article>
      <article class="stat">
        <strong id="pageSizeInfo">20</strong>
        <span>每页条数</span>
      </article>
      <article class="stat">
        <strong id="scopeInfo">全部</strong>
        <span>时间范围</span>
      </article>
    </section>

    <section class="workspace">
      <aside class="panel sticky">
        <div class="panel-head">
          <div>
            <h2>筛选条件</h2>
            <p>支持按任务 ID、表名、操作类型和时间范围定位日志。</p>
          </div>
        </div>

        <div class="stack">
          <div class="field">
            <label for="keywordInput">关键字</label>
            <input id="keywordInput" type="text" placeholder="任务 ID、表名、操作类型">
          </div>

          <div class="field">
            <label for="tableFilter">目标表</label>
            <select id="tableFilter">
              <option value="">全部表</option>
              <option value="Sys_Review_Tasks">审核任务</option>
              <option value="Geno_Trees">家谱树</option>
              <option value="Geno_Generation_Poems">字辈</option>
              <option value="Geno_Members">树成员</option>
              <option value="Geno_Unions">婚姻单元</option>
              <option value="Geno_Union_Members">家庭成员关联</option>
              <option value="Geno_Tree_Permissions">树权限</option>
              <option value="Geno_Events">历史事件</option>
              <option value="Geno_Event_Participants">事件参与者</option>
              <option value="Sys_Media_Files">媒体文件</option>
            </select>
          </div>

          <div class="field">
            <label for="opTypeFilter">操作类型</label>
            <select id="opTypeFilter">
              <option value="">全部类型</option>
              <option value="CREATE">CREATE</option>
              <option value="UPDATE">UPDATE</option>
              <option value="DELETE">DELETE</option>
            </select>
          </div>

          <div class="inline">
            <div class="field">
              <label for="createdFromInput">开始日期</label>
              <input id="createdFromInput" type="date">
            </div>
            <div class="field">
              <label for="createdToInput">结束日期</label>
              <input id="createdToInput" type="date">
            </div>
          </div>

          <div class="field">
            <label for="pageSizeSelect">每页条数</label>
            <select id="pageSizeSelect">
              <option value="10">10</option>
              <option value="20" selected>20</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button id="searchBtn" class="btn" type="button">查询日志</button>
          <button id="resetBtn" class="ghost" type="button">重置条件</button>
        </div>

        <div class="hint-grid">
          <div class="hint">
            <strong>展示边界</strong>
            <p>当前日志详情默认不展示提交人 ID、目标 ID、授权用户 ID 等内部标识，仅在必要时显示任务 ID。</p>
          </div>
          <div class="hint">
            <strong>阅读方式</strong>
            <p>左侧先缩小范围，右侧按卡片查看。每条日志会把操作概况和变更快照拆开，读起来更接近日常表单。</p>
          </div>
        </div>
      </aside>

      <section class="panel">
        <div class="content-top">
          <div>
            <h2>日志结果</h2>
            <p>优先展示人能理解的业务内容，而不是直接把 JSON 和内部标识字段暴露出来。</p>
          </div>
          <div class="actions">
            <a class="ghost" href="profile.html">返回个人中心</a>
          </div>
        </div>

        <div id="message" class="message"></div>
        <div id="logList" class="log-list">
          <div class="empty">正在读取数据库日志...</div>
        </div>

        <div class="pager">
          <div id="pagerText" class="pager-text">共 0 条记录</div>
          <div class="actions">
            <button id="prevBtn" class="ghost" type="button">上一页</button>
            <button id="nextBtn" class="ghost" type="button">下一页</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="js/data-logs.js"></script>
</body>
</html>
