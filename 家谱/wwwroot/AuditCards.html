<div id="audit-card-factory">

    <template id="ApplyAdmin">
        <div class="component-card">
            <div style="color:var(--primary); font-weight:bold; margin-bottom:10px;">🛡️ 权限变更申请</div>
            <div class="data-row">
                <span class="data-label">申请职务：</span>
                <span class="data-value" data-field="NewRoleName"></span>
            </div>
            <div class="data-row">
                <span class="data-label">申请理由：</span>
                <span class="data-value" data-field="Reason"></span>
            </div>
            <div class="data-row">
                <span class="data-label">目标资源：</span>
                <span class="data-value" data-field="TargetId"></span>
            </div>
            <div class="data-row" style="margin-top:10px; border-top:1px dashed #eee; padding-top:8px;">
                <span class="data-label">当前进度：</span>
                <span class="data-value" data-field="StatusText"></span>
            </div>
        </div>
    </template>

    <template id="DefaultCard">
        <div class="component-card">
            <div style="color:#999; margin-bottom:10px; font-size:12px;">系统预留任务数据：</div>
            <pre class="raw-json" style="font-size:11px; background:#f5f5f5; padding:10px; border-radius:4px; white-space: pre-wrap; word-break: break-all;"></pre>
        </div>
    </template>

</div>
