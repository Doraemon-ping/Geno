<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万姓同根 - 公开族谱检索</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b4513;
            --accent: #a0522d;
            --gold: #d4af37;
            --paper: #fdfaf2;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Noto Serif SC", "楷体", serif;
            background: var(--paper);
            color: #333;
            padding-top: 80px;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139, 69, 19, 0.1);
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 4px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-links a,
        .nav-links button {
            text-decoration: none;
            color: #555;
            font-size: 16px;
            background: none;
            border: none;
            font-family: inherit;
            cursor: pointer;
            position: relative;
            padding: 0;
        }

        .nav-links a:hover,
        .nav-links button:hover {
            color: var(--primary);
        }

        .nav-links a.active::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
        }

        .hero {
            height: 280px;
            background: linear-gradient(rgba(44, 30, 22, 0.45), rgba(44, 30, 22, 0.45)), url("https://images.unsplash.com/photo-1516542076529-1ea3854896f2?q=80&w=1800") center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            margin: 0 0 10px;
            font-size: 40px;
            letter-spacing: 8px;
        }

        .hero p {
            margin: 0;
            font-size: 16px;
            opacity: 0.92;
        }

        .container {
            max-width: 1200px;
            margin: -40px auto 50px;
            padding: 0 20px;
        }

        .panel {
            background: white;
            padding: 28px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 22px;
            color: var(--primary);
            border-left: 5px solid var(--primary);
            padding-left: 15px;
            margin-bottom: 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .toolbar {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            margin-bottom: 10px;
        }

        .toolbar input,
        .toolbar select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(139, 69, 19, 0.18);
            border-radius: 2px;
            font-family: inherit;
            background: #fffdf8;
        }

        .summary {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            color: #777;
            font-size: 14px;
        }

        .summary span {
            background: #faf7f2;
            padding: 8px 12px;
            border-left: 3px solid var(--gold);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 22px;
        }

        .tree-card {
            background: white;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border-top: 4px solid transparent;
            transition: 0.35s;
        }

        .tree-card:hover {
            transform: translateY(-8px);
            border-top-color: var(--primary);
        }

        .tree-cover {
            height: 120px;
            background: linear-gradient(135deg, rgba(139, 69, 19, 0.92), rgba(160, 82, 45, 0.9));
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .tree-cover strong {
            font-size: 24px;
            letter-spacing: 2px;
        }

        .tree-body {
            padding: 22px;
        }

        .tree-body h3 {
            margin: 0 0 12px;
            color: var(--primary);
            font-size: 22px;
        }

        .tree-body p {
            margin: 0 0 14px;
            color: #666;
            line-height: 1.7;
            font-size: 14px;
        }

        .tree-meta {
            font-size: 13px;
            color: #888;
            line-height: 1.8;
        }

        .tree-footer {
            padding: 0 22px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .tree-footer a {
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
        }

        .link-button {
            border: none;
            background: var(--primary);
            color: white;
            padding: 8px 14px;
            border-radius: 2px;
            cursor: pointer;
            font-family: inherit;
            text-decoration: none;
        }

        .empty {
            color: #999;
            text-align: center;
            padding: 30px 10px;
        }

        @media (max-width: 768px) {
            .navbar { padding: 0 20px; height: auto; min-height: 80px; }
            .toolbar { grid-template-columns: 1fr; }
            .hero h1 { font-size: 30px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a class="logo" href="index.html">赵氏家谱</a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="my-trees.html" id="myTreesNav" style="display:none">我的族谱</a>
            <a href="public.html" class="active">万姓同根</a>
            <a href="profile.html" id="profileNav" style="display:none">个人中心</a>
            <a href="admin-audit.html" id="auditNav" style="display:none">族务审批</a>
            <a href="login.html" id="loginNav">登录</a>
            <a href="register.html" id="registerNav">申请入谱</a>
            <button id="logoutBtn" style="display:none">退出</button>
        </div>
    </nav>

    <header class="hero">
        <h1>万姓同根 · 谱系可寻</h1>
        <p>浏览已公开卷宗，先阅目录，再入其卷。</p>
    </header>

    <div class="container">
        <div class="panel">
            <div class="section-title">
                <span>公开卷宗检索</span>
                <span style="font-size:14px;color:#888">目录可直览，详情需登录</span>
            </div>
            <div class="toolbar">
                <input id="searchInput" type="text" placeholder="按卷宗名称、始祖、地区搜索">
                <select id="regionFilter">
                    <option value="">全部地区</option>
                </select>
            </div>
            <div class="summary" style="margin-top:16px">
                <span>公开卷宗：<b id="treeCount">0</b></span>
                <span>累计字辈：<b id="poemCount">0</b></span>
                <span id="identityTag">当前身份：游客</span>
            </div>
        </div>

        <div class="grid" id="treeGrid">
            <div class="empty">正在翻阅卷宗...</div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");
        let allTrees = [];

        function authHeaders() {
            return token ? { Authorization: `Bearer ${token}` } : {};
        }

        async function requestJson(url, options = {}) {
            const response = await fetch(url, options);
            const contentType = response.headers.get("content-type") || "";
            const payload = contentType.includes("application/json") ? await response.json() : await response.text();
            if (!response.ok) {
                const message = typeof payload === "string" ? payload : payload?.message;
                throw new Error(message || "请求失败");
            }
            return payload;
        }

        function initNav() {
            if (!token) return;
            document.getElementById("myTreesNav").style.display = "inline";
            document.getElementById("profileNav").style.display = "inline";
            document.getElementById("loginNav").style.display = "none";
            document.getElementById("registerNav").style.display = "none";
            document.getElementById("logoutBtn").style.display = "inline";
            document.getElementById("identityTag").innerHTML = "当前身份：<b>已登录族人</b>";
            document.getElementById("logoutBtn").addEventListener("click", () => {
                localStorage.removeItem("token");
                location.reload();
            });
        }

        async function tryLoadProfile() {
            if (!token) return;
            try {
                const result = await requestJson("/api/Account/profile", { headers: authHeaders() });
                if (result.data.roleType === 0) {
                    document.getElementById("auditNav").style.display = "inline";
                }
            } catch {
                localStorage.removeItem("token");
            }
        }

        function renderTrees(list) {
            document.getElementById("treeCount").textContent = list.length;
            document.getElementById("poemCount").textContent = list.reduce((sum, item) => sum + (item.poems?.length || 0), 0);

            const grid = document.getElementById("treeGrid");
            if (!list.length) {
                grid.innerHTML = '<div class="empty">未找到符合条件的公开卷宗。</div>';
                return;
            }

            grid.innerHTML = list.map(tree => `
                <div class="tree-card">
                    <div class="tree-cover">
                        <span>公开卷宗</span>
                        <strong>${(tree.treeName || "赵氏家谱").slice(0, 6)}</strong>
                    </div>
                    <div class="tree-body">
                        <h3>${tree.treeName}</h3>
                        <p>${tree.description || "当前卷宗已开放目录浏览，登录后可进入详情页查看字辈内容。"}</p>
                        <div class="tree-meta">
                            始祖：${tree.ancestorName || "未载"}<br>
                            地区：${tree.region || "未标注"}<br>
                            字辈数：${tree.poems?.length || 0}
                        </div>
                    </div>
                    <div class="tree-footer">
                        <span style="font-size:12px;color:#999">赵氏公开谱系</span>
                        <a class="link-button" href="${token ? `tree-detail.html?id=${tree.treeID}` : `login.html?redirect=${encodeURIComponent(`tree-detail.html?id=${tree.treeID}`)}`}">
                            ${token ? "查阅" : "登录后查阅"}
                        </a>
                    </div>
                </div>
            `).join("");
        }

        function fillRegionFilter(list) {
            const regionFilter = document.getElementById("regionFilter");
            const regions = [...new Set(list.map(item => item.region).filter(Boolean))];
            regionFilter.innerHTML = '<option value="">全部地区</option>' + regions.map(region => `<option value="${region}">${region}</option>`).join("");
        }

        function applyFilters() {
            const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
            const region = document.getElementById("regionFilter").value;
            const filtered = allTrees.filter(tree => {
                const hitKeyword = !keyword || [tree.treeName, tree.ancestorName, tree.region, tree.description].filter(Boolean).some(value => String(value).toLowerCase().includes(keyword));
                const hitRegion = !region || tree.region === region;
                return hitKeyword && hitRegion;
            });
            renderTrees(filtered);
        }

        async function loadTrees() {
            try {
                const result = await requestJson("/api/GenoTree/GetAll", { headers: authHeaders() });
                allTrees = Array.isArray(result.data) ? result.data.filter(item => item.isPublic) : [];
                fillRegionFilter(allTrees);
                renderTrees(allTrees);
            } catch (error) {
                document.getElementById("treeGrid").innerHTML = `<div class="empty">${error.message}</div>`;
            }
        }

        document.getElementById("searchInput").addEventListener("input", applyFilters);
        document.getElementById("regionFilter").addEventListener("change", applyFilters);

        initNav();
        tryLoadProfile();
        loadTrees();
    </script>
</body>
</html>
