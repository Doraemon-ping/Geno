<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的申请</title>
  <link rel="stylesheet" href="css/my-applications.css">
  <link rel="stylesheet" href="css/ui-polish.css">
</head>
<body>
  <nav class="nav">
    <a class="logo" href="index.html">赵氏家谱</a>
    <div class="links">
      <a href="index.html">首页</a>
      <a href="my-trees.html">我的家谱</a>
      <a href="profile.html">个人中心</a>
      <a href="my-applications.html">我的申请</a>
      <button id="logoutBtn" type="button">退出</button>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-inner">
      <h1>我的申请</h1>
      <p>这里集中展示你提交过的系统权限、树权限和内容变更申请，并可按分页查看审核结果。</p>
    </div>
  </header>

  <main class="container">
    <section class="summary">
      <div class="card"><strong id="totalCount">0</strong><span>全部申请</span></div>
      <div class="card"><strong id="pendingCount">0</strong><span>待审核</span></div>
      <div class="card"><strong id="pageInfo">第 1 / 1 页</strong><span>分页状态</span></div>
    </section>

    <section class="card">
      <h2 class="section-title">
        <span>申请记录</span>
        <div class="actions">
          <a class="ghost" href="profile.html">返回个人中心</a>
        </div>
      </h2>
      <div id="message" class="message"></div>
      <div id="taskList" class="card-list">
        <div class="empty">正在读取申请记录...</div>
      </div>
      <div class="pager">
        <span id="pagerText">共 0 条记录</span>
        <div class="actions">
          <button id="prevBtn" class="ghost" type="button">上一页</button>
          <button id="nextBtn" class="ghost" type="button">下一页</button>
        </div>
      </div>
    </section>
  </main>

  <script src="js/my-applications.js"></script>
</body>
</html>
